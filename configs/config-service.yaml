server:
  http:
    addr: 0.0.0.0:8005
  grpc:
    addr: 0.0.0.0:9005
data:
  database:
    driver: mysql
    source: ${DATABASE_DSN}
  redis:
    addr: ${REDIS_ADDR:-127.0.0.1:6379}
registry:
  type: ${REGISTRY_TYPE:-}
  consul:
    address: ${CONSUL_ADDR:-127.0.0.1:8500}
    health_check_interval: 10
config_svc:
  cache_ttl: ${CONFIG_CACHE_TTL:-300}
  namespace: ${CONFIG_NAMESPACE:-default}
