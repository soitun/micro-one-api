server:
  http:
    addr: 0.0.0.0:8006
  grpc:
    addr: 0.0.0.0:9006
data:
  database:
    driver: mysql
    source: ${DATABASE_DSN:-root:password@tcp(127.0.0.1:3306)/oneapi}
  redis:
    addr: ${REDIS_ADDR:-127.0.0.1:6379}
registry:
  type: ${REGISTRY_TYPE:-}
  consul:
    address: ${CONSUL_ADDR:-127.0.0.1:8500}
    health_check_interval: 10
log_svc:
  retention_days: ${LOG_RETENTION_DAYS:-30}
  batch_size: ${LOG_BATCH_SIZE:-100}
