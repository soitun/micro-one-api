server:
  http:
    addr: 0.0.0.0:8004
  grpc:
    addr: 0.0.0.0:9004
data:
  database:
    driver: mysql
    source: ${DATABASE_DSN}
  redis:
    addr: ${REDIS_ADDR:-127.0.0.1:6379}
registry:
  type: ${REGISTRY_TYPE:-}
  consul:
    address: ${CONSUL_ADDR:-127.0.0.1:8500}
    health_check_interval: 10
billing:
  reservation_timeout: 5m
  group_ratios:
    default: 1.0
    vip: 1.0
    svip: 1.0
