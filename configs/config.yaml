server:
  http:
    addr: ${RELAY_HTTP_ADDR:-0.0.0.0:8080}
  grpc:
    addr: 0.0.0.0:9003
registry:
  type: ${REGISTRY_TYPE:-}
  consul:
    address: ${CONSUL_ADDR:-127.0.0.1:8500}
    health_check_interval: 10
clients:
  identity:
    endpoint: ${IDENTITY_GRPC_ENDPOINT:-127.0.0.1:9001}
  channel:
    endpoint: ${CHANNEL_GRPC_ENDPOINT:-127.0.0.1:9002}
  billing:
    endpoint: ${BILLING_GRPC_ENDPOINT:-127.0.0.1:9004}
  log:
    endpoint: ${LOG_GRPC_ENDPOINT:-127.0.0.1:9006}
redis:
  addr: ${REDIS_ADDR:-127.0.0.1:6379}
  password: ${REDIS_PASSWORD:-}
retry:
  max_attempts: 3
  initial_interval: 500ms
  max_interval: 5s
  multiplier: 2.0
  retryable_status:
    - 429
    - 500
    - 502
    - 503
models:
  path: ${MODELS_PATH:-/configs/models.yaml}

# Hybrid adaptor layer: routes subscription-account (Codex/Claude OAuth)
# channel types through the OAuth adaptor path instead of the default
# provider-factory direct call. Required when subscription accounts are
# configured — otherwise requests for subscription-account models (e.g.
# gpt-5, gpt-5.5 served by chatgpt-pro-1) fall through to the default
# OpenAI provider path which uses the (empty) channel key and fails with
# 502 "upstream service error".
hybrid_adaptor:
  enabled: true
  identity_ttl: 24h
  refresh_interval: 10m
  refresh_lookahead: 24h
  # runtime_block tunes the per-account cool-down applied during
  # subscription-account failover. Empty/omitted fields use the defaults shown.
  runtime_block:
    rate_limited_duration: 5s   # cool-down after an upstream 429
    unauthorized_duration: 2m   # cool-down after an upstream 401
    server_error_duration: 2m   # cool-down after an upstream 5xx
    overloaded_duration: 30s    # cool-down after an upstream 529 (Overloaded)
    active_gauge_interval: 30s   # how often the Redis blocker scans for the active-block gauge

# session_sticky binds a conversation (session_hash) to the subscription
# account that served it so subsequent turns reuse the same upstream account
# (prompt-cache reuse, docs #7). Applies to the chat-completions and
# anthropic-messages entry points; the Responses/WS path keeps its own sticky.
# Disabled by default; only effective when hybrid_adaptor is enabled. The
# binding TTL reuses openai_ws.sticky_ttl (default 1h).
session_sticky:
  enabled: true

# subscription gates the user-subscription quota-enforcement middleware at the
# relay entry point: when a user exceeds their daily/weekly/monthly USD limit
# the request is rejected with 429 + Retry-After. Fail-open — users without an
# active subscription (or when the check errors) pass through unaffected.
# Requires relay-gateway to reach the subscription DB (SQL_DSN / SUBSCRIPTION_SQL_DSN).
subscription:
  enabled: true
  user_rpm_limit: ${SUBSCRIPTION_USER_RPM_LIMIT:-0}

# openai_ws tunes the Codex Responses WebSocket relay (inbound /v1/responses
# upgrade). All fields are optional; omitted values fall back to sensible
# defaults (see internal/conf OpenAIWSConfig getters). drain_timeout bounds the
# graceful shutdown window for in-flight WS relays before force-close
# (Phase 3.3); while draining, /healthz returns 503 so load balancers route to
# a healthy replica.
openai_ws:
  drain_timeout: ${OPENAI_WS_DRAIN_TIMEOUT:-30s}
