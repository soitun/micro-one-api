server:
  http:
    addr: 0.0.0.0:8002
  grpc:
    addr: 0.0.0.0:9002
data:
  database:
    driver: mysql
    source: ${DATABASE_DSN}
  redis:
    addr: ${REDIS_ADDR:-127.0.0.1:6379}
registry:
  type: ${REGISTRY_TYPE:-}
  consul:
    address: ${CONSUL_ADDR:-127.0.0.1:8500}
    health_check_interval: 10

