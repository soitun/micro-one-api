# Model mapping configuration
# Maps client-facing model names to actual upstream model names
# and defines model capabilities.
#
# When a client requests "gpt-4o", the relay will resolve it to
# "gpt-4o-2024-08-06" before sending to the upstream provider.

models:
  # OpenAI GPT-4o family
  gpt-4o:
    actual_name: gpt-4o-2024-08-06
    capabilities:
      - function_call
      - vision
      - streaming
  gpt-4o-mini:
    actual_name: gpt-4o-mini-2024-07-18
    capabilities:
      - function_call
      - vision
      - streaming

  # OpenAI GPT-4 family
  gpt-4-turbo:
    actual_name: gpt-4-turbo-2024-09-14
    capabilities:
      - function_call
      - vision
      - streaming
  gpt-4:
    actual_name: gpt-4-0613
    capabilities:
      - function_call
      - streaming

  # OpenAI GPT-3.5 family
