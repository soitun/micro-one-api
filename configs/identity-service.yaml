server:
  http:
    addr: 0.0.0.0:8001
  grpc:
    addr: 0.0.0.0:9001
data:
  database:
    driver: mysql
    source: ${DATABASE_DSN}
  redis:
    addr: ${REDIS_ADDR:-127.0.0.1:6379}
registry:
  type: ${REGISTRY_TYPE:-}
  consul:
    address: ${CONSUL_ADDR:-127.0.0.1:8500}
    health_check_interval: 10
oauth:
  base_url: ${OAUTH_BASE_URL:-http://localhost:8001}
  github:
    enabled: ${OAUTH_GITHUB_ENABLED:-false}
    client_id: ${OAUTH_GITHUB_CLIENT_ID:-}
    client_secret: ${OAUTH_GITHUB_CLIENT_SECRET:-}
  google:
    enabled: ${OAUTH_GOOGLE_ENABLED:-false}
    client_id: ${OAUTH_GOOGLE_CLIENT_ID:-}
    client_secret: ${OAUTH_GOOGLE_CLIENT_SECRET:-}
registration:
  disabled: ${REGISTRATION_DISABLED:-false}
  email_domain_restriction_enabled: ${REGISTRATION_EMAIL_DOMAIN_RESTRICTION_ENABLED:-false}
  email_domain_whitelist: ${REGISTRATION_EMAIL_DOMAIN_WHITELIST:-[]}
  turnstile_check_enabled: ${TURNSTILE_CHECK_ENABLED:-false}
  turnstile_secret: ${TURNSTILE_SECRET:-}
