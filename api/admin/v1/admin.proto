syntax = "proto3";

package api.admin.v1;

import "api/common/v1/common.proto";
import "google/api/annotations.proto";

option go_package = "micro-one-api/api/admin/v1;adminv1";

service AdminService {
  // ========== 账务相关（透传 billing-service）==========
  rpc TopUpQuota(TopUpQuotaRequest) returns (TopUpQuotaResponse);
  rpc CreateRedeemCode(CreateRedeemCodeRequest) returns (CreateRedeemCodeResponse);
  rpc CreateRedeemCodesBatch(CreateRedeemCodesBatchRequest) returns (CreateRedeemCodesBatchResponse);
  rpc GetRedeemCode(GetRedeemCodeRequest) returns (RedeemCodeResponse);
  rpc ListRedeemCodes(ListRedeemCodesRequest) returns (ListRedeemCodesResponse) {
    option (google.api.http) = {
      get: "/v1/redeem-codes"
    };
  }
  rpc SearchRedeemCodes(SearchRedeemCodesRequest) returns (RedeemCodesSearchResponse);
  rpc UpdateRedeemCode(UpdateRedeemCodeRequest) returns (UpdateRedeemCodeResponse);
  rpc DeleteRedeemCode(DeleteRedeemCodeRequest) returns (DeleteRedeemCodeResponse);
  rpc ListUserLedger(ListUserLedgerRequest) returns (UserLedgerResponse);
  rpc GetAccountSnapshot(GetAccountSnapshotRequest) returns (AdminAccountSnapshotResponse) {
    option (google.api.http) = {
      get: "/v1/account"
    };
  }

  // ========== 用户管理（透传 identity-service）==========
  rpc ListUsers(AdminListUsersRequest) returns (AdminListUsersResponse) {
    option (google.api.http) = {
      get: "/v1/users"
    };
  }
  rpc CreateUser(AdminCreateUserRequest) returns (AdminCreateUserResponse);
  rpc UpdateUser(AdminUpdateUserRequest) returns (AdminUpdateUserResponse);
  rpc DeleteUser(AdminDeleteUserRequest) returns (AdminDeleteUserResponse);
  rpc ResetUserQuota(ResetUserQuotaRequest) returns (ResetUserQuotaResponse);
  rpc SetUserRole(AdminSetUserRoleRequest) returns (AdminSetUserRoleResponse);

  // ========== 渠道管理（透传 channel-service）==========
  rpc ListChannels(AdminListChannelsRequest) returns (AdminListChannelsResponse) {
    option (google.api.http) = {
      get: "/v1/channels"
    };
  }
  rpc CreateChannel(AdminCreateChannelRequest) returns (AdminCreateChannelResponse);
  rpc UpdateChannel(AdminUpdateChannelRequest) returns (AdminUpdateChannelResponse);
  rpc DeleteChannel(AdminDeleteChannelRequest) returns (AdminDeleteChannelResponse);
  rpc ChangeChannelStatus(AdminChangeChannelStatusRequest) returns (AdminChangeChannelStatusResponse);
  rpc ListSubscriptionAccounts(AdminListSubscriptionAccountsRequest) returns (AdminListSubscriptionAccountsResponse) {
    option (google.api.http) = {
      get: "/v1/subscription-accounts"
    };
  };
  rpc CreateSubscriptionAccount(AdminCreateSubscriptionAccountRequest) returns (AdminCreateSubscriptionAccountResponse) {
    option (google.api.http) = {
      post: "/v1/subscription-accounts"
      body: "*"
    };
  };
  rpc UpdateSubscriptionAccount(AdminUpdateSubscriptionAccountRequest) returns (AdminUpdateSubscriptionAccountResponse) {
    option (google.api.http) = {
      put: "/v1/subscription-accounts/{id}"
      body: "*"
    };
  };
  rpc DeleteSubscriptionAccount(AdminDeleteSubscriptionAccountRequest) returns (AdminDeleteSubscriptionAccountResponse) {
    option (google.api.http) = {
      delete: "/v1/subscription-accounts/{account_id}"
    };
  };
  rpc ChangeSubscriptionAccountStatus(AdminChangeSubscriptionAccountStatusRequest) returns (AdminChangeSubscriptionAccountStatusResponse) {
    option (google.api.http) = {
      put: "/v1/subscription-accounts/{account_id}/status"
      body: "*"
    };
  };

  // ========== 系统配置管理 ==========
  rpc GetSystemOptions(GetSystemOptionsRequest) returns (GetSystemOptionsResponse) {
    option (google.api.http) = {
      get: "/v1/system/options"
    };
  }
  rpc UpdateSystemOptions(UpdateSystemOptionsRequest) returns (UpdateSystemOptionsResponse) {
    option (google.api.http) = {
      put: "/v1/system/options"
      body: "*"
    };
  }

  // ========== 日志查询 ==========
  rpc ListLogs(ListLogsRequest) returns (ListLogsResponse) {
    option (google.api.http) = {
      get: "/v1/logs"
    };
  }
}

// ========== 账务：充值 ==========

message TopUpQuotaRequest {
  string user_id = 1;
  int64 amount = 2;
  string operator_id = 3;
  string remark = 4;
}

message TopUpQuotaResponse {
  bool success = 1;
  int64 new_balance = 2;
  string error_message = 3;
}

// ========== 账务：兑换码 ==========

message CreateRedeemCodeRequest {
  string code = 1;
  string name = 2;
  int64 amount = 3;
  int32 count = 4;
  string operator_id = 5;
}

message CreateRedeemCodeResponse {
  bool success = 1;
  string error_message = 2;
}

message CreateRedeemCodesBatchRequest {
  string name = 1;
  int64 amount = 2;
  int32 count = 3;
  int32 batch_size = 4;
  string operator_id = 5;
}

message CreateRedeemCodesBatchResponse {
  bool success = 1;
  repeated string codes = 2;
  string error_message = 3;
}

message GetRedeemCodeRequest {
  string code = 1;
}

message RedeemCodeResponse {
  RedeemCodeInfo redeem_code = 1;
  string error_message = 2;
}

message RedeemCodeInfo {
  string code = 1;
  string name = 2;
  int64 amount = 3;
  int32 count = 4;
  int32 status = 5;
  string created_by = 6;
  int64 created_at = 7;
}

message ListRedeemCodesRequest {
  int32 page = 1;
  int32 page_size = 2;
}

message ListRedeemCodesResponse {
  repeated RedeemCodeInfo codes = 1;
  int64 total = 2;
}

message SearchRedeemCodesRequest {
  string keyword = 1;
}

message RedeemCodesSearchResponse {
  repeated RedeemCodeInfo codes = 1;
}

message UpdateRedeemCodeRequest {
  string code = 1;
  string name = 2;
  int64 amount = 3;
  int32 status = 4;
}

message UpdateRedeemCodeResponse {
  bool success = 1;
  string error_message = 2;
}

message DeleteRedeemCodeRequest {
  string code = 1;
}

message DeleteRedeemCodeResponse {
  bool success = 1;
  string error_message = 2;
}

// ========== 账务：流水 ==========

message ListUserLedgerRequest {
  string user_id = 1;
  int32 page = 2;
  int32 page_size = 3;
}

message UserLedgerResponse {
  repeated common.v1.LedgerInfo ledgers = 1;
  int64 total = 2;
}

// ========== 账务：账户快照（admin 视图）==========

message GetAdminAccountSnapshotRequest {
  string user_id = 1;
}

message GetAccountSnapshotRequest {
  string user_id = 1;
}

message AdminAccountSnapshotResponse {
  common.v1.AccountInfo account = 1;
}

// ========== 用户管理 ==========

message AdminListUsersRequest {
  int32 page = 1;
  int32 page_size = 2;
  string keyword = 3;
  string group = 4;
  int32 status = 5;
}

message AdminListUsersResponse {
  repeated common.v1.UserInfo users = 1;
  int64 total = 2;
}

message AdminCreateUserRequest {
  string username = 1;
  string display_name = 2;
  string email = 3;
  string password = 4;
  string group = 5;
  int64 balance = 6;
}

message AdminCreateUserResponse {
  bool success = 1;
  string message = 2;
  int64 user_id = 3;
}

message AdminUpdateUserRequest {
  int64 user_id = 1;
  string display_name = 2;
  string email = 3;
  string group = 4;
  int32 status = 5;
  int64 balance = 6;
}

message AdminUpdateUserResponse {
  bool success = 1;
  string message = 2;
}

message AdminDeleteUserRequest {
  int64 user_id = 1;
}

message AdminDeleteUserResponse {
  bool success = 1;
  string message = 2;
}

message ResetUserQuotaRequest {
  int64 user_id = 1;
  int64 new_balance = 2;
  string operator_id = 3;
  string remark = 4;
}

message ResetUserQuotaResponse {
  bool success = 1;
  string message = 2;
}

message AdminSetUserRoleRequest {
  int64 user_id = 1;
  int32 role = 2;
  // Operator (admin issuing the change). When 0, admin-api treats the
  // call as a system-level invocation that bypasses operator-vs-target
  // rank checks; HTTP gateways should populate it from the request's
  // X-Operator-User-Id header.
  int64 operator_user_id = 3;
}

message AdminSetUserRoleResponse {
  bool success = 1;
  string message = 2;
  int32 role = 3;
}

// ========== 渠道管理 ==========

message AdminListChannelsRequest {
  int32 page = 1;
  int32 page_size = 2;
  string keyword = 3;
  string group = 4;
  int32 status = 5;
  int32 type = 6;
}

message AdminListChannelsResponse {
  repeated common.v1.ChannelSummary channels = 1;
  int64 total = 2;
}

message AdminCreateChannelRequest {
  string name = 1;
  int32 type = 2;
  string base_url = 3;
  string key = 4;
  string models = 5;
  string group = 6;
  int64 priority = 7;
  common.v1.ChannelConfig config = 8;
  uint32 weight = 9;
  string model_mapping = 10;
  string system_prompt = 11;
}

message AdminCreateChannelResponse {
  bool success = 1;
  string message = 2;
  int64 channel_id = 3;
}

message AdminUpdateChannelRequest {
  int64 channel_id = 1;
  string name = 2;
  string base_url = 3;
  string key = 4;
  string models = 5;
  string group = 6;
  int64 priority = 7;
  common.v1.ChannelConfig config = 8;
  uint32 weight = 9;
  string model_mapping = 10;
  string system_prompt = 11;
}

message AdminUpdateChannelResponse {
  bool success = 1;
  string message = 2;
}

message AdminDeleteChannelRequest {
  int64 channel_id = 1;
}

message AdminDeleteChannelResponse {
  bool success = 1;
  string message = 2;
}

message AdminChangeChannelStatusRequest {
  int64 channel_id = 1;
  int32 status = 2;
}

message AdminChangeChannelStatusResponse {
  bool success = 1;
  string message = 2;
}

message AdminListSubscriptionAccountsRequest {
  int32 page = 1;
  int32 page_size = 2;
  string keyword = 3;
  string group = 4;
  int32 status = 5;
  string platform = 6;
}

message AdminListSubscriptionAccountsResponse {
  repeated common.v1.SubscriptionAccountSummary accounts = 1;
  int64 total = 2;
}

message AdminCreateSubscriptionAccountRequest {
  string name = 1;
  string platform = 2;
  string account_type = 3;
  string group = 4;
  string models = 5;
  int64 priority = 6;
  string base_url = 7;
  string access_token = 8;
  string refresh_token = 9;
  int64 expires_at = 10;
  string account_id = 11;
  string fingerprint = 12;
  string metadata = 13;
}

message AdminCreateSubscriptionAccountResponse {
  bool success = 1;
  string message = 2;
  int64 account_id = 3;
}

message AdminUpdateSubscriptionAccountRequest {
  int64 id = 1;
  string name = 2;
  string account_type = 3;
  string group = 4;
  string models = 5;
  int64 priority = 6;
  string base_url = 7;
  string access_token = 8;
  string refresh_token = 9;
  int64 expires_at = 10;
  string account_id = 11;
  string fingerprint = 12;
  string metadata = 13;
}

message AdminUpdateSubscriptionAccountResponse {
  bool success = 1;
  string message = 2;
}

message AdminDeleteSubscriptionAccountRequest {
  int64 account_id = 1;
}

message AdminDeleteSubscriptionAccountResponse {
  bool success = 1;
  string message = 2;
}

message AdminChangeSubscriptionAccountStatusRequest {
  int64 account_id = 1;
  int32 status = 2;
}

message AdminChangeSubscriptionAccountStatusResponse {
  bool success = 1;
  string message = 2;
}

// ========== 系统配置 ==========

message GetSystemOptionsRequest {}

message GetSystemOptionsResponse {
  common.v1.SystemOptions options = 1;
}

message UpdateSystemOptionsRequest {
  common.v1.SystemOptions options = 1;
}

message UpdateSystemOptionsResponse {
  bool success = 1;
  string message = 2;
}

// ========== 日志查询 ==========

message ListLogsRequest {
  int32 page = 1;
  int32 page_size = 2;
  string user_id = 3;
  string type = 4;
  int64 start_time = 5;
  int64 end_time = 6;
}

message ListLogsResponse {
  repeated LogEntry logs = 1;
  int64 total = 2;
}

message LogEntry {
  int64 id = 1;
  string user_id = 2;
  string type = 3;
  int64 amount = 4;
  int64 balance_after = 5;
  string reference_id = 6;
  string remark = 7;
  int64 created_at = 8;
}
