syntax = "proto3";

package api.admin.v1;

option go_package = "micro-one-api/api/admin/v1;adminv1";

service AdminService {
  // 充值接口
  rpc TopUpQuota(TopUpQuotaRequest) returns (TopUpQuotaResponse);

  // 创建兑换码
  rpc CreateRedeemCode(CreateRedeemCodeRequest) returns (CreateRedeemCodeResponse);

  // 批量创建兑换码
  rpc CreateRedeemCodesBatch(CreateRedeemCodesBatchRequest) returns (CreateRedeemCodesBatchResponse);

  // 获取兑换码
  rpc GetRedeemCode(GetRedeemCodeRequest) returns (GetRedeemCodeResponse);

  // 获取兑换码列表
  rpc ListRedeemCodes(ListRedeemCodesRequest) returns (ListRedeemCodesResponse);

  // 搜索兑换码
  rpc SearchRedeemCodes(SearchRedeemCodesRequest) returns (SearchRedeemCodesResponse);

  // 更新兑换码
  rpc UpdateRedeemCode(UpdateRedeemCodeRequest) returns (UpdateRedeemCodeResponse);

  // 删除兑换码
  rpc DeleteRedeemCode(DeleteRedeemCodeRequest) returns (DeleteRedeemCodeResponse);

  // 查询用户流水
  rpc ListUserLedger(ListUserLedgerRequest) returns (ListUserLedgerResponse);

  // 获取账户快照
  rpc GetAccountSnapshot(GetAccountSnapshotRequest) returns (GetAccountSnapshotResponse);
}

// 充值请求
message TopUpQuotaRequest {
  string user_id = 1;
  int64 amount = 2;
  string operator_id = 3;
  string remark = 4;
}

// 充值响应
message TopUpQuotaResponse {
  bool success = 1;
  int64 new_balance = 2;
  string error_message = 3;
}

// 创建兑换码请求
message CreateRedeemCodeRequest {
  string code = 1;
  string name = 2;
  int64 amount = 3;
  int32 count = 4;
  string operator_id = 5;
}

// 创建兑换码响应
message CreateRedeemCodeResponse {
  bool success = 1;
  string error_message = 2;
}

// 批量创建兑换码请求
message CreateRedeemCodesBatchRequest {
  string name = 1;
  int64 amount = 2;
  int32 count = 3;
  int32 batch_size = 4;
  string operator_id = 5;
}

// 批量创建兑换码响应
message CreateRedeemCodesBatchResponse {
  bool success = 1;
  repeated string codes = 2;
  string error_message = 3;
}

// 获取兑换码请求
message GetRedeemCodeRequest {
  string code = 1;
}

// 获取兑换码响应
message GetRedeemCodeResponse {
  RedeemCodeInfo redeem_code = 1;
  string error_message = 2;
}

// 搜索兑换码请求
message SearchRedeemCodesRequest {
  string keyword = 1;
}

// 搜索兑换码响应
message SearchRedeemCodesResponse {
  repeated RedeemCodeInfo codes = 1;
}

// 更新兑换码请求
message UpdateRedeemCodeRequest {
  string code = 1;
  string name = 2;
  int64 amount = 3;
  int32 status = 4;
}

// 更新兑换码响应
message UpdateRedeemCodeResponse {
  bool success = 1;
  string error_message = 2;
}

// 删除兑换码请求
message DeleteRedeemCodeRequest {
  string code = 1;
}

// 删除兑换码响应
message DeleteRedeemCodeResponse {
  bool success = 1;
  string error_message = 2;
}

// 兑换码列表请求
message ListRedeemCodesRequest {
  int32 page = 1;
  int32 page_size = 2;
}

// 兑换码信息
message RedeemCodeInfo {
  string code = 1;
  string name = 2;
  int64 amount = 3;
  int32 count = 4;
  int32 status = 5;
  string created_by = 6;
  int64 created_at = 7;
}

// 兑换码列表响应
message ListRedeemCodesResponse {
  repeated RedeemCodeInfo codes = 1;
  int64 total = 2;
}

// 用户流水列表请求
message ListUserLedgerRequest {
  string user_id = 1;
  int32 page = 2;
  int32 page_size = 3;
}

// 流水信息
message LedgerInfo {
  uint64 id = 1;
  string user_id = 2;
  int64 amount = 3;
  int64 balance_after = 4;
  string type = 5;
  string reference_id = 6;
  string remark = 7;
  int64 created_at = 8;
}

// 用户流水列表响应
message ListUserLedgerResponse {
  repeated LedgerInfo ledgers = 1;
  int64 total = 2;
}

// 获取账户快照请求
message GetAccountSnapshotRequest {
  string user_id = 1;
}

// 账户信息
message AccountInfo {
  string user_id = 1;
  string username = 2;
  string display_name = 3;
  string group = 4;
  int64 quota = 5;
  int64 used_quota = 6;
  int64 request_count = 7;
  int64 frozen_quota = 8;
  int32 status = 9;
}

// 获取账户快照响应
message GetAccountSnapshotResponse {
  AccountInfo account = 1;
}

