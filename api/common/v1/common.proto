syntax = "proto3";

package api.common.v1;

import "google/protobuf/timestamp.proto";

option go_package = "micro-one-api/api/common/v1;commonv1";

// ========== 用户信息 ==========

message UserInfo {
  int64 id = 1;
  string username = 2;
  string display_name = 3;
  string email = 4;
  string group = 5;
  int32 status = 6;
  int64 quota = 7;
  int64 used_quota = 8;
  int64 frozen_quota = 9;
  int64 created_at = 10;
  int64 last_login_at = 11;
  // 0=guest, 1=common, 10=admin, 100=root. See biz.Role* constants.
  int32 role = 12;
}

// ========== 渠道摘要 ==========

message ChannelSummary {
  int64 id = 1;
  string name = 2;
  int32 type = 3;
  string group = 4;
  int32 status = 5;
  int64 priority = 6;
  int64 created_at = 7;
  string models = 8;
  uint32 weight = 9;
  int64 test_time = 10;
  int64 response_time = 11;
  double balance = 12;
  int64 balance_updated_time = 13;
  int64 used_quota = 14;
  string health_status = 15;
  string health_last_error = 16;
  int64 health_last_success_time = 17;
  int64 health_last_failure_time = 18;
  int32 health_consecutive_failures = 19;
  int64 circuit_opened_until = 20;
}

// ========== 渠道配置 ==========

message ChannelConfig {
  string api_version = 1;
  string region = 2;
  string library_id = 3;
  string plugin = 4;
  string vertex_ai_project_id = 5;
}

// ========== 渠道完整信息 ==========

message ChannelInfo {
  int64 id = 1;
  int32 type = 2;
  string name = 3;
  int32 status = 4;
  string base_url = 5;
  string group = 6;
  string models = 7;
  int64 priority = 8;
  string key = 9;
  ChannelConfig config = 10;
  uint32 weight = 11;
  int64 test_time = 12;
  int64 response_time = 13;
  double balance = 14;
  int64 balance_updated_time = 15;
  int64 used_quota = 16;
  string model_mapping = 17;
  string system_prompt = 18;
  string balance_refresh_last_error = 19;
  int64 balance_refresh_last_success_time = 20;
  int32 consecutive_balance_refresh_failures = 21;
  string health_status = 22;
  string health_last_error = 23;
  int64 health_last_success_time = 24;
  int64 health_last_failure_time = 25;
  int32 health_consecutive_failures = 26;
  int64 circuit_opened_until = 27;
}

// ========== 订阅账号 ==========

message SubscriptionAccountInfo {
  int64 id = 1;
  string name = 2;
  string platform = 3;
  string account_type = 4;
  int32 status = 5;
  string group = 6;
  string models = 7;
  int64 priority = 8;
  string base_url = 9;
  string access_token = 10;
  string refresh_token = 11;
  int64 expires_at = 12;
  string account_id = 13;
  string fingerprint = 14;
  string metadata = 15;
  int64 created_at = 16;
  int64 updated_at = 17;
  int32 concurrency = 18;             // 最大并发请求数(0 表示不限制)
}

message SubscriptionAccountSummary {
  int64 id = 1;
  string name = 2;
  string platform = 3;
  string account_type = 4;
  int32 status = 5;
  string group = 6;
  string models = 7;
  int64 priority = 8;
  string account_id = 9;
  int64 expires_at = 10;
  int64 updated_at = 11;
  int64 last_used_at = 12;            // 最近一次服务请求时间（unix）
  int64 rate_limited_until = 13;      // 因上游 429/overload 冷却到的 unix 时间
  float quota_used_percent = 14;      // 上游订阅配额使用百分比（0-100）
  int64 quota_reset_at = 15;          // 订阅配额窗口重置的 unix 时间
  int32 concurrency = 16;             // 最大并发请求数
}

// ========== 账户快照 ==========

message AccountSnapshot {
  string user_id = 1;
  int64 quota = 2;
  int64 used_quota = 3;
  int64 request_count = 4;
  string group = 5;
  double group_ratio = 6;
  int64 frozen_quota = 7;
}

// ========== 账户信息（管理端视图）==========

message AccountInfo {
  string user_id = 1;
  string username = 2;
  string display_name = 3;
  string group = 4;
  int64 quota = 5;
  int64 used_quota = 6;
  int64 request_count = 7;
  int64 frozen_quota = 8;
  int32 status = 9;
}

// ========== 兑换码 ==========

message RedeemCode {
  string code = 1;
  string name = 2;
  int64 amount = 3;
  int32 count = 4;
  int32 status = 5;
  string created_by = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
}

// ========== 兑换码信息（管理端视图）==========

message RedeemCodeInfo {
  string code = 1;
  string name = 2;
  int64 amount = 3;
  int32 count = 4;
  int32 status = 5;
  string created_by = 6;
  int64 created_at = 7;
}

// ========== 流水记录 ==========

message LedgerEntry {
  string id = 1;
  string user_id = 2;
  int64 amount = 3;
  int64 balance_after = 4;
  string type = 5;
  string reference_id = 6;
  string remark = 7;
  google.protobuf.Timestamp created_at = 8;
  string token_name = 9;
  string model_name = 10;
  int64 quota = 11;
  int64 prompt_tokens = 12;
  int64 completion_tokens = 13;
  int64 channel_id = 14;
  int64 elapsed_time = 15;
  bool is_stream = 16;
  string endpoint = 17;
  int64 cache_read_tokens = 18;
  int64 subscription_account_id = 19;  // 订阅账号 ID（0 = 非订阅账号请求）
}

// ========== 流水信息（管理端视图）==========

message LedgerInfo {
  uint64 id = 1;
  string user_id = 2;
  int64 amount = 3;
  int64 balance_after = 4;
  string type = 5;
  string reference_id = 6;
  string remark = 7;
  int64 created_at = 8;
}

// ========== 系统选项 ==========

message SystemOptions {
  string site_title = 1;
  string site_description = 2;
  bool registration_enabled = 3;
  bool chat_history_enabled = 4;
  string theme = 5;
  string notice = 6;
  int64 max_token_per_user = 7;
  double default_ratio = 8;
}

// ========== 分页 ==========

message PaginationRequest {
  int32 page = 1;
  int32 page_size = 2;
}

message PaginationResponse {
  int64 total = 1;
}

// ========== 通用响应 ==========

message Empty {}

message Error {
  string code = 1;
  string message = 2;
}
