syntax = "proto3";

package api.identity.v1;

import "api/common/v1/common.proto";

option go_package = "micro-one-api/api/identity/v1;identityv1";

service IdentityService {
  rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenReply);
  rpc GetAuthSnapshot(GetAuthSnapshotRequest) returns (GetAuthSnapshotReply);
  rpc GetUser(GetUserRequest) returns (GetUserReply);
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc CreateAccessToken(CreateAccessTokenRequest) returns (CreateAccessTokenResponse);
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);
  rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse);
  rpc DeleteUser(DeleteUserRequest) returns (DeleteUserResponse);
}

message ValidateTokenRequest {
  string token = 1;
}

message ValidateTokenReply {
  bool valid = 1;
  int64 user_id = 2;
  int64 token_id = 3;
  string message = 4;
}

message GetAuthSnapshotRequest {
  string token = 1;
}

message GetAuthSnapshotReply {
  int64 user_id = 1;
  int64 token_id = 2;
  string group = 3;
  repeated string allowed_models = 4;
  bool user_enabled = 5;
  bool token_enabled = 6;
}

message GetUserRequest {
  int64 user_id = 1;
}

message GetUserReply {
  common.v1.UserInfo user = 1;
}

// ========== 用户认证 ==========

message LoginRequest {
  string username = 1;
  string password = 2;
}

message LoginResponse {
  bool success = 1;
  string message = 2;
  string token = 3;
  int64 user_id = 4;
}

message RegisterRequest {
  string username = 1;
  string password = 2;
  string email = 3;
  string group = 4;
}

message RegisterResponse {
  bool success = 1;
  string message = 2;
  int64 user_id = 3;
}

// ========== Token 管理 ==========

message CreateAccessTokenRequest {
  int64 user_id = 1;
  string name = 2;
  repeated string models = 3;
  int64 expire_at = 4;
}

message CreateAccessTokenResponse {
  bool success = 1;
  string message = 2;
  string token = 3;
  int64 token_id = 4;
}

// ========== 用户管理 ==========

message ListUsersRequest {
  int32 page = 1;
  int32 page_size = 2;
  string keyword = 3;
  string group = 4;
  int32 status = 5;
}

message ListUsersResponse {
  repeated common.v1.UserInfo users = 1;
  int64 total = 2;
}

message CreateUserRequest {
  string username = 1;
  string display_name = 2;
  string email = 3;
  string password = 4;
  string group = 5;
  int64 quota = 6;
}

message CreateUserResponse {
  bool success = 1;
  string message = 2;
  int64 user_id = 3;
}

message UpdateUserRequest {
  int64 user_id = 1;
  string display_name = 2;
  string email = 3;
  string group = 4;
  int32 status = 5;
}

message UpdateUserResponse {
  bool success = 1;
  string message = 2;
}

message DeleteUserRequest {
  int64 user_id = 1;
}

message DeleteUserResponse {
  bool success = 1;
  string message = 2;
}
