syntax = "proto3";

package api.log.v1;

import "google/api/annotations.proto";

option go_package = "micro-one-api/api/log/v1;logv1";

service LogService {
  rpc GetLog(GetLogRequest) returns (GetLogResponse) {
    option (google.api.http) = {
      get: "/v1/logs/{id}"
    };
  }
  rpc ListLogs(ListLogsRequest) returns (ListLogsResponse) {
    option (google.api.http) = {
      get: "/v1/logs"
    };
  }
  rpc IngestLog(IngestLogRequest) returns (IngestLogResponse) {
    option (google.api.http) = {
      post: "/v1/logs"
      body: "*"
    };
  }
}

message GetLogRequest {
  int64 id = 1;
}

message GetLogResponse {
  int64 id = 1;
  string level = 2;
  string message = 3;
  string source = 4;
  string request_id = 5;
  int64 user_id = 6;
  int64 created_at = 7;
  string username = 8;
  string token_name = 9;
  string model_name = 10;
  int64 quota = 11;
  int64 prompt_tokens = 12;
  int64 completion_tokens = 13;
  int64 channel_id = 14;
  int64 elapsed_time = 15;
  bool is_stream = 16;
  int64 cache_read_tokens = 17;
}

message ListLogsRequest {
  int32 page = 1;
  int32 page_size = 2;
  string type = 3;
}

message ListLogsResponse {
  repeated GetLogResponse items = 1;
  int64 total = 2;
}

message IngestLogRequest {
  string level = 1;
  string message = 2;
  string source = 3;
  string request_id = 4;
  int64 user_id = 5;
  string username = 6;
  string token_name = 7;
  string model_name = 8;
  int64 quota = 9;
  int64 prompt_tokens = 10;
  int64 completion_tokens = 11;
  int64 channel_id = 12;
  int64 elapsed_time = 13;
  bool is_stream = 14;
  int64 cache_read_tokens = 15;
}

message IngestLogResponse {
  int64 id = 1;
}
