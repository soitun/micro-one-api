syntax = "proto3";

package api.billing.v1;

import "google/protobuf/timestamp.proto";
import "api/common/v1/common.proto";

option go_package = "micro-one-api/api/billing/v1;billingv1";

service BillingService {
  rpc ReserveQuota(ReserveQuotaRequest) returns (ReserveQuotaResponse);
  rpc CommitQuota(CommitQuotaRequest) returns (CommitQuotaResponse);
  rpc ReleaseQuota(ReleaseQuotaRequest) returns (ReleaseQuotaResponse);
  rpc GetAccountSnapshot(GetAccountSnapshotRequest) returns (GetAccountSnapshotResponse);
  rpc TopUpQuota(TopUpQuotaRequest) returns (TopUpQuotaResponse);
  rpc CreateRedeemCode(CreateRedeemCodeRequest) returns (CreateRedeemCodeResponse);
  rpc CreateRedeemCodesBatch(CreateRedeemCodesBatchRequest) returns (CreateRedeemCodesBatchResponse);
  rpc RedeemCode(RedeemCodeRequest) returns (RedeemCodeResponse);
  rpc GetRedeemCode(GetRedeemCodeRequest) returns (GetRedeemCodeResponse);
  rpc ListRedeemCodes(ListRedeemCodesRequest) returns (ListRedeemCodesResponse);
  rpc SearchRedeemCodes(SearchRedeemCodesRequest) returns (SearchRedeemCodesResponse);
  rpc UpdateRedeemCode(UpdateRedeemCodeRequest) returns (UpdateRedeemCodeResponse);
  rpc DeleteRedeemCode(DeleteRedeemCodeRequest) returns (DeleteRedeemCodeResponse);
  rpc ListLedger(ListLedgerRequest) returns (ListLedgerResponse);
  rpc CreatePaymentOrder(CreatePaymentOrderRequest) returns (PaymentOrderResponse);
  rpc GetPaymentOrderByTradeNo(GetPaymentOrderByTradeNoRequest) returns (PaymentOrderResponse);
  rpc MarkPaymentOrderPaid(MarkPaymentOrderPaidRequest) returns (PaymentOrderResponse);
  rpc ListPaymentOrders(ListPaymentOrdersRequest) returns (ListPaymentOrdersResponse);
  rpc ListReconciliationRuns(ListReconciliationRunsRequest) returns (ListReconciliationRunsResponse);
  rpc GetReconciliationRun(GetReconciliationRunRequest) returns (GetReconciliationRunResponse);
}

// ========== 配额预扣 ==========

message ReserveQuotaRequest {
  string user_id = 1;
  string request_id = 2;
  int64 estimated_tokens = 3;
  string model = 4;
  string channel_id = 5;
}

message ReserveQuotaResponse {
  bool success = 1;
  string reservation_id = 2;
  int64 reserved_amount = 3;
  string error_message = 4;
}

message CommitQuotaRequest {
  string reservation_id = 1;
  int64 actual_tokens = 2;
  int64 actual_cost = 3;
  bool success = 4;
  string token_name = 5;
  string endpoint = 6;
  int64 prompt_tokens = 7;
  int64 completion_tokens = 8;
  int64 elapsed_time = 9;
  bool is_stream = 10;
  int64 cache_read_tokens = 11;
}

message CommitQuotaResponse {
  bool success = 1;
  int64 committed_amount = 2;
  int64 refund_amount = 3;
  string error_message = 4;
}

message ReleaseQuotaRequest {
  string reservation_id = 1;
  string reason = 2;
}

message ReleaseQuotaResponse {
  bool success = 1;
  int64 released_amount = 2;
  string error_message = 3;
}

// ========== 账户快照 ==========

message GetAccountSnapshotRequest {
  string user_id = 1;
}

message GetAccountSnapshotResponse {
  common.v1.AccountSnapshot snapshot = 1;
}

// ========== 充值 ==========

message TopUpQuotaRequest {
  string user_id = 1;
  int64 amount = 2;
  string operator_id = 3;
  string remark = 4;
}

message TopUpQuotaResponse {
  bool success = 1;
  int64 new_quota = 2;
  string error_message = 3;
}

// ========== 兑换码 ==========

message CreateRedeemCodeRequest {
  string code = 1;
  string name = 2;
  int64 amount = 3;
  int32 count = 4;
  string operator_id = 5;
}

message CreateRedeemCodeResponse {
  bool success = 1;
  string error_message = 2;
}

message CreateRedeemCodesBatchRequest {
  string name = 1;
  int64 amount = 2;
  int32 count = 3;
  int32 batch_size = 4;
  string operator_id = 5;
}

message CreateRedeemCodesBatchResponse {
  bool success = 1;
  repeated string codes = 2;
  string error_message = 3;
}

message RedeemCodeRequest {
  string user_id = 1;
  string code = 2;
}

message RedeemCodeResponse {
  bool success = 1;
  int64 amount = 2;
  int64 new_quota = 3;
  string error_message = 4;
}

message GetRedeemCodeRequest {
  string code = 1;
}

message GetRedeemCodeResponse {
  common.v1.RedeemCode redeem_code = 1;
  string error_message = 2;
}

message ListRedeemCodesRequest {
  int32 page = 1;
  int32 page_size = 2;
}

message ListRedeemCodesResponse {
  repeated common.v1.RedeemCode codes = 1;
  int64 total = 2;
}

message SearchRedeemCodesRequest {
  string keyword = 1;
}

message SearchRedeemCodesResponse {
  repeated common.v1.RedeemCode codes = 1;
}

message UpdateRedeemCodeRequest {
  string code = 1;
  string name = 2;
  int64 amount = 3;
  int32 status = 4;
}

message UpdateRedeemCodeResponse {
  bool success = 1;
  string error_message = 2;
}

message DeleteRedeemCodeRequest {
  string code = 1;
}

message DeleteRedeemCodeResponse {
  bool success = 1;
  string error_message = 2;
}

// ========== 流水 ==========

message ListLedgerRequest {
  string user_id = 1;
  int32 page = 2;
  int32 page_size = 3;
  google.protobuf.Timestamp start_time = 4;
  google.protobuf.Timestamp end_time = 5;
}

message ListLedgerResponse {
  repeated common.v1.LedgerEntry entries = 1;
  int64 total = 2;
}

// ========== 支付订单 ==========

message PaymentOrder {
  int64 id = 1;
  string user_id = 2;
  string trade_no = 3;
  string channel = 4;
  string asset_type = 5;
  int64 asset_amount = 6;
  int64 money_cents = 7;
  string currency = 8;
  string status = 9;
  string provider_trade_no = 10;
  string provider_payload = 11;
  string pay_url = 12;
  string asset_issue_status = 13;
  google.protobuf.Timestamp paid_at = 14;
  google.protobuf.Timestamp created_at = 15;
  google.protobuf.Timestamp updated_at = 16;
}

message CreatePaymentOrderRequest {
  string user_id = 1;
  string channel = 2;
  string asset_type = 3;
  int64 asset_amount = 4;
  int64 money_cents = 5;
  string currency = 6;
}

message GetPaymentOrderByTradeNoRequest {
  string trade_no = 1;
}

message MarkPaymentOrderPaidRequest {
  string trade_no = 1;
  string provider_trade_no = 2;
}

message PaymentOrderResponse {
  bool success = 1;
  string error_message = 2;
  PaymentOrder order = 3;
}

message ListPaymentOrdersRequest {
  int32 page = 1;
  int32 page_size = 2;
  string user_id = 3;
  string status = 4;
  string channel = 5;
  string trade_no = 6;
  int64 start_time = 7;
  int64 end_time = 8;
}

message ListPaymentOrdersResponse {
  repeated PaymentOrder orders = 1;
  int64 total = 2;
}

// ========== 对账 ==========

message ReconciliationRun {
  int64 run_id = 1;
  int64 run_at = 2;
  int32 expired_cleaned = 3;
  int32 total_accounts = 4;
  int32 total_reservations = 5;
  int32 discrepancy_count = 6;
  repeated ReconciliationDiscrepancy discrepancies = 7;
}

message ReconciliationDiscrepancy {
  string user_id = 1;
  int64 expected_quota = 2;
  int64 actual_quota = 3;
  int64 ledger_net_amount = 4;
  int64 frozen_quota = 5;
}

message ListReconciliationRunsRequest {
  int32 page = 1;
  int32 page_size = 2;
}

message ListReconciliationRunsResponse {
  repeated ReconciliationRun runs = 1;
  int64 total = 2;
}

message GetReconciliationRunRequest {
  int64 run_id = 1;
}

message GetReconciliationRunResponse {
  ReconciliationRun run = 1;
}
