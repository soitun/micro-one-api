syntax = "proto3";

package api.billing.v1;

import "google/protobuf/timestamp.proto";
import "api/common/v1/common.proto";

option go_package = "micro-one-api/api/billing/v1;billingv1";

service BillingService {
  rpc ReserveQuota(ReserveQuotaRequest) returns (ReserveQuotaResponse);
  rpc CommitQuota(CommitQuotaRequest) returns (CommitQuotaResponse);
  rpc ReleaseQuota(ReleaseQuotaRequest) returns (ReleaseQuotaResponse);
  rpc GetAccountSnapshot(GetAccountSnapshotRequest) returns (GetAccountSnapshotResponse);
  rpc TopUpQuota(TopUpQuotaRequest) returns (TopUpQuotaResponse);
  rpc PurchaseSubscription(PurchaseSubscriptionRequest) returns (PurchaseSubscriptionResponse);
  rpc CreateRedeemCode(CreateRedeemCodeRequest) returns (CreateRedeemCodeResponse);
  rpc CreateRedeemCodesBatch(CreateRedeemCodesBatchRequest) returns (CreateRedeemCodesBatchResponse);
  rpc RedeemCode(RedeemCodeRequest) returns (RedeemCodeResponse);
  rpc GetRedeemCode(GetRedeemCodeRequest) returns (GetRedeemCodeResponse);
  rpc ListRedeemCodes(ListRedeemCodesRequest) returns (ListRedeemCodesResponse);
  rpc SearchRedeemCodes(SearchRedeemCodesRequest) returns (SearchRedeemCodesResponse);
  rpc UpdateRedeemCode(UpdateRedeemCodeRequest) returns (UpdateRedeemCodeResponse);
  rpc DeleteRedeemCode(DeleteRedeemCodeRequest) returns (DeleteRedeemCodeResponse);
  rpc ListLedger(ListLedgerRequest) returns (ListLedgerResponse);
  rpc BatchGetAccountSnapshots(BatchGetAccountSnapshotsRequest) returns (BatchGetAccountSnapshotsResponse);
  rpc CreatePaymentOrder(CreatePaymentOrderRequest) returns (PaymentOrderResponse);
  rpc GetPaymentOrderByTradeNo(GetPaymentOrderByTradeNoRequest) returns (PaymentOrderResponse);
  rpc MarkPaymentOrderPaid(MarkPaymentOrderPaidRequest) returns (PaymentOrderResponse);
  rpc ListPaymentOrders(ListPaymentOrdersRequest) returns (ListPaymentOrdersResponse);
  rpc ListReconciliationRuns(ListReconciliationRunsRequest) returns (ListReconciliationRunsResponse);
  rpc GetReconciliationRun(GetReconciliationRunRequest) returns (GetReconciliationRunResponse);
  rpc AggregateLedgerByDate(AggregateLedgerByDateRequest) returns (AggregateLedgerByDateResponse);
  rpc AggregateUsage(AggregateUsageRequest) returns (AggregateUsageResponse);
}

// ========== 配额预扣 ==========

message ReserveQuotaRequest {
  string user_id = 1;
  string request_id = 2;
  int64 estimated_tokens = 3;
  string model = 4;
  string channel_id = 5;
  int64 subscription_account_id = 6;  // 订阅账号 ID（0 = 非订阅账号请求）
}

message ReserveQuotaResponse {
  bool success = 1;
  string reservation_id = 2;
  int64 reserved_amount = 3;
  string error_message = 4;
}

message CommitQuotaRequest {
  string reservation_id = 1;
  int64 actual_tokens = 2;
  int64 actual_cost = 3;
  bool success = 4;
  string token_name = 5;
  string endpoint = 6;
  int64 prompt_tokens = 7;
  int64 completion_tokens = 8;
  int64 elapsed_time = 9;
  bool is_stream = 10;
  int64 cache_read_tokens = 11;
  // Optional upstream cost override in quota units. When omitted, billing-service
  // calculates it from upstream pricing config.
  int64 upstream_cost = 12;
  int64 subscription_account_id = 13;  // 订阅账号 ID（0 = 非订阅账号请求；覆盖预留时记录的账号）
}

message CommitQuotaResponse {
  bool success = 1;
  int64 committed_amount = 2;
  int64 refund_amount = 3;
  string error_message = 4;
}

message ReleaseQuotaRequest {
  string reservation_id = 1;
  string reason = 2;
}

message ReleaseQuotaResponse {
  bool success = 1;
  int64 released_amount = 2;
  string error_message = 3;
}

// ========== 账户快照 ==========

message GetAccountSnapshotRequest {
  string user_id = 1;
}

message GetAccountSnapshotResponse {
  common.v1.AccountSnapshot snapshot = 1;
}

message BatchGetAccountSnapshotsRequest {
  repeated string user_ids = 1;
}

message BatchGetAccountSnapshotsResponse {
  map<string, common.v1.AccountSnapshot> snapshots = 1;
}

// ========== 充值 ==========

message TopUpQuotaRequest {
  string user_id = 1;
  int64 amount = 2;
  string operator_id = 3;
  string remark = 4;
}

message TopUpQuotaResponse {
  bool success = 1;
  int64 new_quota = 2;
  string error_message = 3;
}

// PurchaseSubscription atomically deducts price_quota from the user's wallet and
// records a "subscription" ledger entry. It does NOT create the subscription row
// itself — the caller (admin-api) creates the subscription and, on failure,
// compensates by topping the quota back up.
message PurchaseSubscriptionRequest {
  string user_id = 1;
  int64 price_quota = 2;
  int64 group_id = 3;
  string remark = 4;
}

message PurchaseSubscriptionResponse {
  bool success = 1;
  int64 new_quota = 2;
  string error_message = 3;
}

// ========== 兑换码 ==========

message CreateRedeemCodeRequest {
  string code = 1;
  string name = 2;
  int64 amount = 3;
  int32 count = 4;
  string operator_id = 5;
}

message CreateRedeemCodeResponse {
  bool success = 1;
  string error_message = 2;
}

message CreateRedeemCodesBatchRequest {
  string name = 1;
  int64 amount = 2;
  int32 count = 3;
  int32 batch_size = 4;
  string operator_id = 5;
}

message CreateRedeemCodesBatchResponse {
  bool success = 1;
  repeated string codes = 2;
  string error_message = 3;
}

message RedeemCodeRequest {
  string user_id = 1;
  string code = 2;
}

message RedeemCodeResponse {
  bool success = 1;
  int64 amount = 2;
  int64 new_quota = 3;
  string error_message = 4;
}

message GetRedeemCodeRequest {
  string code = 1;
}

message GetRedeemCodeResponse {
  common.v1.RedeemCode redeem_code = 1;
  string error_message = 2;
}

message ListRedeemCodesRequest {
  int32 page = 1;
  int32 page_size = 2;
}

message ListRedeemCodesResponse {
  repeated common.v1.RedeemCode codes = 1;
  int64 total = 2;
}

message SearchRedeemCodesRequest {
  string keyword = 1;
}

message SearchRedeemCodesResponse {
  repeated common.v1.RedeemCode codes = 1;
}

message UpdateRedeemCodeRequest {
  string code = 1;
  string name = 2;
  int64 amount = 3;
  int32 status = 4;
}

message UpdateRedeemCodeResponse {
  bool success = 1;
  string error_message = 2;
}

message DeleteRedeemCodeRequest {
  string code = 1;
}

message DeleteRedeemCodeResponse {
  bool success = 1;
  string error_message = 2;
}

// ========== 流水 ==========

message ListLedgerRequest {
  string user_id = 1;
  int32 page = 2;
  int32 page_size = 3;
  google.protobuf.Timestamp start_time = 4;
  google.protobuf.Timestamp end_time = 5;
  string type = 6;
  int64 subscription_account_id = 7;  // 可选：限定订阅账号（0 表示不限定）
}

message ListLedgerResponse {
  repeated common.v1.LedgerEntry entries = 1;
  int64 total = 2;
}

// ========== 支付订单 ==========

message PaymentOrder {
  int64 id = 1;
  string user_id = 2;
  string trade_no = 3;
  string channel = 4;
  string asset_type = 5;
  int64 asset_amount = 6;
  int64 money_cents = 7;
  string currency = 8;
  string status = 9;
  string provider_trade_no = 10;
  string provider_payload = 11;
  string pay_url = 12;
  string asset_issue_status = 13;
  int64 group_id = 14;  // Subscription group ID for auto-assignment after payment
  google.protobuf.Timestamp paid_at = 15;
  google.protobuf.Timestamp created_at = 16;
  google.protobuf.Timestamp updated_at = 17;
}

message CreatePaymentOrderRequest {
  string user_id = 1;
  string channel = 2;
  string asset_type = 3;
  int64 asset_amount = 4;
  int64 money_cents = 5;
  string currency = 6;
  int64 group_id = 7;  // Optional: subscription group ID for auto-assignment after payment
}

message GetPaymentOrderByTradeNoRequest {
  string trade_no = 1;
}

message MarkPaymentOrderPaidRequest {
  string trade_no = 1;
  string provider_trade_no = 2;
}

message PaymentOrderResponse {
  bool success = 1;
  string error_message = 2;
  PaymentOrder order = 3;
}

message ListPaymentOrdersRequest {
  int32 page = 1;
  int32 page_size = 2;
  string user_id = 3;
  string status = 4;
  string channel = 5;
  string trade_no = 6;
  int64 start_time = 7;
  int64 end_time = 8;
}

message ListPaymentOrdersResponse {
  repeated PaymentOrder orders = 1;
  int64 total = 2;
}

// ========== 对账 ==========

message ReconciliationRun {
  int64 run_id = 1;
  int64 run_at = 2;
  int32 expired_cleaned = 3;
  int32 total_accounts = 4;
  int32 total_reservations = 5;
  int32 discrepancy_count = 6;
  repeated ReconciliationDiscrepancy discrepancies = 7;
  int32 total_channels = 8;
}

message ReconciliationDiscrepancy {
  string user_id = 1;
  int64 expected_quota = 2;
  int64 actual_quota = 3;
  int64 ledger_net_amount = 4;
  int64 frozen_quota = 5;
  string type = 6;
  int64 channel_id = 7;
  int64 expected_used_quota = 8;
  int64 actual_used_quota = 9;
  int64 ledger_quota = 10;
  int64 upstream_cost = 11;
  int64 difference = 12;
  int64 ledger_count = 13;
  int64 log_count = 14;
  int64 log_quota = 15;
  int64 count_diff = 16;
  int64 quota_diff = 17;
}

message ListReconciliationRunsRequest {
  int32 page = 1;
  int32 page_size = 2;
}

message ListReconciliationRunsResponse {
  repeated ReconciliationRun runs = 1;
  int64 total = 2;
}

message GetReconciliationRunRequest {
  int64 run_id = 1;
}

message GetReconciliationRunResponse {
  ReconciliationRun run = 1;
}

// ========== 按日聚合 ==========

message AggregateLedgerByDateRequest {
  string user_id = 1;
  google.protobuf.Timestamp start_time = 2;
  google.protobuf.Timestamp end_time = 3;
  string type = 4; // 默认 "consume"
}

message AggregateLedgerByDateResponse {
  repeated DailyUsage daily = 1;
  repeated ModelUsage models = 2;
  int64 total_quota = 3;
  int64 total_prompt_tokens = 4;
  int64 total_completion_tokens = 5;
  int64 total_count = 6;
  int64 total_cache_read_tokens = 7;
}

message DailyUsage {
  string date = 1;
  int64 quota = 2;              // SUM(ABS(amount))
  int64 prompt_tokens = 3;
  int64 completion_tokens = 4;
  int64 count = 5;
  int64 elapsed_time = 6;
  int64 cache_read_tokens = 7;
}

message ModelUsage {
  string model = 1;
  int64 tokens = 2;
}

// ========== 多维用量聚合 ==========

// AggregateUsageRequest 跨用户、多维度的真实 SQL 聚合（替代抽样统计）。
message AggregateUsageRequest {
  // 维度：user | channel | model | token | type | day | hour | subscription_account。可组合，按顺序生成分组键。
  repeated string group_by = 1;
  string user_id = 2;     // 可选：限定用户
  int64 channel_id = 3;   // 可选：限定渠道（0 表示不限定）
  string model = 4;       // 可选：限定模型
  string type = 5;        // 可选：账本类型，默认 "consume"
  google.protobuf.Timestamp start_time = 6;
  google.protobuf.Timestamp end_time = 7;
  int32 limit = 8;        // 可选：返回前 N 个桶（按 quota 降序），0 表示不限制
  int64 subscription_account_id = 9;  // 可选：限定订阅账号（0 表示不限定）
}

message AggregateUsageResponse {
  repeated UsageBucket buckets = 1;
  UsageTotals totals = 2;
}

// UsageBucket 一个分组维度组合下的聚合值。
message UsageBucket {
  string user_id = 1;
  int64 channel_id = 2;
  string model = 3;
  string token_name = 4;
  string type = 5;
  string day = 6;   // YYYY-MM-DD（当 group_by 含 day）
  string hour = 7;  // YYYY-MM-DD HH（当 group_by 含 hour）
  int64 quota = 8;  // SUM(ABS(amount))
  int64 prompt_tokens = 9;
  int64 completion_tokens = 10;
  int64 count = 11;
  int64 elapsed_time = 12;
  int64 upstream_cost = 13;
  int64 gross_profit = 14;
  int64 cache_read_tokens = 15;
  int64 subscription_account_id = 16;  // 订阅账号 ID（当 group_by 含 subscription_account）
}

message UsageTotals {
  int64 quota = 1;
  int64 prompt_tokens = 2;
  int64 completion_tokens = 3;
  int64 count = 4;
  int64 elapsed_time = 5;
  int64 upstream_cost = 6;
  int64 gross_profit = 7;
  int64 cache_read_tokens = 8;
}
