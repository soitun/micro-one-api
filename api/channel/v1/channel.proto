syntax = "proto3";

package api.channel.v1;

import "api/common/v1/common.proto";

option go_package = "micro-one-api/api/channel/v1;channelv1";

service ChannelService {
  rpc SelectChannel(SelectChannelRequest) returns (SelectChannelReply);
  rpc SelectSubscriptionAccount(SelectSubscriptionAccountRequest) returns (SelectSubscriptionAccountReply);
  rpc GetSubscriptionAccount(GetSubscriptionAccountRequest) returns (GetSubscriptionAccountReply);
  rpc ListSubscriptionAccounts(ListSubscriptionAccountsRequest) returns (ListSubscriptionAccountsResponse);
  rpc ListOAuthRefreshCandidates(ListOAuthRefreshCandidatesRequest) returns (ListOAuthRefreshCandidatesResponse);
  rpc ClearSubscriptionAccountError(ClearSubscriptionAccountErrorRequest) returns (ClearSubscriptionAccountErrorResponse);
  rpc SetSubscriptionAccountError(SetSubscriptionAccountErrorRequest) returns (SetSubscriptionAccountErrorResponse);
  rpc SetTempUnschedulable(SetTempUnschedulableRequest) returns (SetTempUnschedulableResponse);
  rpc ClearTempUnschedulable(ClearTempUnschedulableRequest) returns (ClearTempUnschedulableResponse);
  rpc CreateSubscriptionAccount(CreateSubscriptionAccountRequest) returns (CreateSubscriptionAccountResponse);
  rpc UpdateSubscriptionAccount(UpdateSubscriptionAccountRequest) returns (UpdateSubscriptionAccountResponse);
  rpc DeleteSubscriptionAccount(DeleteSubscriptionAccountRequest) returns (DeleteSubscriptionAccountResponse);
  rpc ChangeSubscriptionAccountStatus(ChangeSubscriptionAccountStatusRequest) returns (ChangeSubscriptionAccountStatusResponse);
  rpc GetChannel(GetChannelRequest) returns (GetChannelReply);
  rpc ListAvailableModels(ListAvailableModelsRequest) returns (ListAvailableModelsReply);
  rpc ListChannels(ListChannelsRequest) returns (ListChannelsResponse);
  rpc CreateChannel(CreateChannelRequest) returns (CreateChannelResponse);
  rpc UpdateChannel(UpdateChannelRequest) returns (UpdateChannelResponse);
  rpc RecordChannelUsage(RecordChannelUsageRequest) returns (RecordChannelUsageResponse);
  rpc RecordChannelHealth(RecordChannelHealthRequest) returns (RecordChannelHealthResponse);
  rpc DeleteChannel(DeleteChannelRequest) returns (DeleteChannelResponse);
  rpc ChangeChannelStatus(ChangeChannelStatusRequest) returns (ChangeChannelStatusResponse);
}

message SelectChannelRequest {
  string group = 1;
  string model = 2;
  bool exclude_first_priority = 3;
}

message SelectChannelReply {
  common.v1.ChannelInfo channel = 1;
}

message SelectSubscriptionAccountRequest {
  string group = 1;
  string model = 2;
  string platform = 3;
  bool exclude_first_priority = 4;
}

message SelectSubscriptionAccountReply {
  common.v1.SubscriptionAccountInfo account = 1;
}

message GetSubscriptionAccountRequest {
  int64 account_id = 1;
}

message GetSubscriptionAccountReply {
  common.v1.SubscriptionAccountInfo account = 1;
}

message GetChannelRequest {
  int64 channel_id = 1;
}

message GetChannelReply {
  common.v1.ChannelInfo channel = 1;
}

message ListAvailableModelsRequest {
  string group = 1;
}

message ListAvailableModelsReply {
  repeated string models = 1;
}

// ========== 渠道管理 ==========

message ListChannelsRequest {
  int32 page = 1;
  int32 page_size = 2;
  string keyword = 3;
  string group = 4;
  int32 status = 5;
  int32 type = 6;
}

message ListChannelsResponse {
  repeated common.v1.ChannelSummary channels = 1;
  int64 total = 2;
}

message ListSubscriptionAccountsRequest {
  int32 page = 1;
  int32 page_size = 2;
  string keyword = 3;
  string group = 4;
  int32 status = 5;
  string platform = 6;
}

message ListSubscriptionAccountsResponse {
  repeated common.v1.SubscriptionAccountSummary accounts = 1;
  int64 total = 2;
}

message ListOAuthRefreshCandidatesRequest {
  int64 within_seconds = 1;
}

message ListOAuthRefreshCandidatesResponse {
  repeated int64 account_ids = 1;
}

message ClearSubscriptionAccountErrorRequest {
  int64 account_id = 1;
}

message ClearSubscriptionAccountErrorResponse {
  bool success = 1;
  string message = 2;
}

message SetSubscriptionAccountErrorRequest {
  int64 account_id = 1;
  string message = 2;
}

message SetSubscriptionAccountErrorResponse {
  bool success = 1;
  string message = 2;
}

message SetTempUnschedulableRequest {
  int64 account_id = 1;
  int64 until = 2;
  string reason = 3;
}

message SetTempUnschedulableResponse {
  bool success = 1;
  string message = 2;
}

message ClearTempUnschedulableRequest {
  int64 account_id = 1;
}

message ClearTempUnschedulableResponse {
  bool success = 1;
  string message = 2;
}

message CreateSubscriptionAccountRequest {
  string name = 1;
  string platform = 2;
  string account_type = 3;
  string group = 4;
  string models = 5;
  int64 priority = 6;
  string base_url = 7;
  string access_token = 8;
  string refresh_token = 9;
  int64 expires_at = 10;
  string account_id = 11;
  string fingerprint = 12;
  string metadata = 13;
}

message CreateSubscriptionAccountResponse {
  bool success = 1;
  string message = 2;
  int64 account_id = 3;
}

message UpdateSubscriptionAccountRequest {
  int64 id = 1;
  string name = 2;
  string account_type = 3;
  string group = 4;
  string models = 5;
  int64 priority = 6;
  string base_url = 7;
  string access_token = 8;
  string refresh_token = 9;
  int64 expires_at = 10;
  string account_id = 11;
  string fingerprint = 12;
  string metadata = 13;
}

message UpdateSubscriptionAccountResponse {
  bool success = 1;
  string message = 2;
}

message DeleteSubscriptionAccountRequest {
  int64 account_id = 1;
}

message DeleteSubscriptionAccountResponse {
  bool success = 1;
  string message = 2;
}

message ChangeSubscriptionAccountStatusRequest {
  int64 account_id = 1;
  int32 status = 2;
}

message ChangeSubscriptionAccountStatusResponse {
  bool success = 1;
  string message = 2;
}

message CreateChannelRequest {
  string name = 1;
  int32 type = 2;
  string base_url = 3;
  string key = 4;
  string models = 5;
  string group = 6;
  int64 priority = 7;
  common.v1.ChannelConfig config = 8;
  uint32 weight = 9;
  string model_mapping = 10;
  string system_prompt = 11;
}

message CreateChannelResponse {
  bool success = 1;
  string message = 2;
  int64 channel_id = 3;
}

message UpdateChannelRequest {
  int64 channel_id = 1;
  string name = 2;
  string base_url = 3;
  string key = 4;
  string models = 5;
  string group = 6;
  int64 priority = 7;
  common.v1.ChannelConfig config = 8;
  uint32 weight = 9;
  string model_mapping = 10;
  string system_prompt = 11;
  double balance = 12;
  int64 balance_updated_time = 13;
  string balance_refresh_last_error = 14;
  int64 balance_refresh_last_success_time = 15;
  int32 consecutive_balance_refresh_failures = 16;
  // when true, the three balance_refresh_* fields above are written to the channel as-is
  // (so callers can clear last_error by passing "" and reset the counter by passing 0).
  bool set_balance_refresh_fields = 17;
}

message UpdateChannelResponse {
  bool success = 1;
  string message = 2;
}

message RecordChannelUsageRequest {
  int64 channel_id = 1;
  int64 quota = 2;
}

message RecordChannelUsageResponse {
  bool success = 1;
  string message = 2;
}

message RecordChannelHealthRequest {
  int64 channel_id = 1;
  bool success = 2;
  string error = 3;
  int64 response_time = 4;
}

message RecordChannelHealthResponse {
  bool success = 1;
  string message = 2;
}

message DeleteChannelRequest {
  int64 channel_id = 1;
}

message DeleteChannelResponse {
  bool success = 1;
  string message = 2;
}

message ChangeChannelStatusRequest {
  int64 channel_id = 1;
  int32 status = 2;
}

message ChangeChannelStatusResponse {
  bool success = 1;
  string message = 2;
}
