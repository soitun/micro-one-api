apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-api
  namespace: one-api
  labels:
    app: admin-api
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: admin-api
  template:
    metadata:
      labels:
        app: admin-api
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
        readOnlyRootFilesystem: true
      containers:
      - name: admin-api
        image: your-registry/admin-api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          protocol: TCP
          name: http
        - containerPort: 9000
          protocol: TCP
          name: grpc
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          privileged: false
          readOnlyRootFilesystem: true
        env:
        - name: CONF_PATH
          value: "configs/admin-api.yaml"
        - name: IDENTITY_GRPC_ENDPOINT
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: identity-grpc-endpoint
        - name: CHANNEL_GRPC_ENDPOINT
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: channel-grpc-endpoint
        - name: BILLING_GRPC_ENDPOINT
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: billing-grpc-endpoint
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: log-level
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          tcpSocket:
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          tcpSocket:
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: admin-api
  namespace: one-api
  labels:
    app: admin-api
spec:
  type: ClusterIP
  ports:
  - port: 3000
    targetPort: 3000
    protocol: TCP
    name: http
  - port: 9000
    targetPort: 9000
    protocol: TCP
    name: grpc
  selector:
    app: admin-api
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: admin-api-pdb
  namespace: one-api
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: admin-api
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: admin-api-hpa
  namespace: one-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: admin-api
  minReplicas: 2
  maxReplicas: 6
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
