# Phase 2 Services: config-service, log-service, monitor-worker, notify-worker

# ────────────── config-service ──────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-service
  namespace: one-api
  labels:
    app: config-service
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: config-service
  template:
    metadata:
      labels:
        app: config-service
        version: v1
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
        readOnlyRootFilesystem: true
      containers:
      - name: config-service
        image: your-registry/config-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 9005
          protocol: TCP
          name: grpc
        - containerPort: 8005
          protocol: TCP
          name: http
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          privileged: false
        env:
        - name: CONF_PATH
          value: "/configs/config.yaml"
        - name: DATABASE_DSN
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: dsn
        - name: SERVICE_TOKEN
          valueFrom:
            secretKeyRef:
              name: service-token-secret
              key: token
              optional: true
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "250m"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8005
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8005
          initialDelaySeconds: 5
          periodSeconds: 10
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: config-service
  namespace: one-api
  labels:
    app: config-service
spec:
  type: ClusterIP
  ports:
  - port: 9005
    targetPort: 9005
    protocol: TCP
    name: grpc
  - port: 8005
    targetPort: 8005
    protocol: TCP
    name: http
  selector:
    app: config-service
---
