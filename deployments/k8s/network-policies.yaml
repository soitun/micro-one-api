---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: monitor-worker-netpol
  namespace: one-api
spec:
  podSelector:
    matchLabels:
      app: monitor-worker
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: admin-api
    ports:
    - protocol: TCP
      port: 9007
    - protocol: TCP
      port: 8007
  egress:
  - to:
    - namespaceSelector: {}
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - protocol: UDP
      port: 53
  - to: []
    ports:
    - protocol: TCP
      port: 3306
  - to: []
    ports:
    - protocol: TCP
      port: 6379
  # Allow monitor-worker to probe channel-service.
  - to:
    - podSelector:
        matchLabels:
          app: channel-service
    ports:
    - protocol: TCP
      port: 9002
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: notify-worker-netpol
  namespace: one-api
spec:
  podSelector:
    matchLabels:
      app: notify-worker
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: admin-api
    - podSelector:
        matchLabels:
          app: channel-service
    - podSelector:
        matchLabels:
          app: billing-service
    ports:
    - protocol: TCP
      port: 9008
    - protocol: TCP
      port: 8008
  egress:
  - to:
    - namespaceSelector: {}
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - protocol: UDP
      port: 53
  - to: []
    ports:
    - protocol: TCP
      port: 3306
  - to: []
    ports:
    - protocol: TCP
      port: 6379
  # Allow webhook and SMTP-over-TLS delivery.
  - to: []
    ports:
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 465
    - protocol: TCP
      port: 587
