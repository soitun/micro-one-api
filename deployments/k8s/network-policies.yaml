    - podSelector:
        matchLabels:
          app: relay-gateway
    - podSelector:
        matchLabels:
          app: admin-api
    ports:
    - protocol: TCP
      port: 9005
    - protocol: TCP
      port: 8005
  egress:
  - to:
    - namespaceSelector: {}
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - protocol: UDP
      port: 53
  - to: []
    ports:
    - protocol: TCP
      port: 3306
  - to: []
    ports:
    - protocol: TCP
      port: 6379
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: log-service-netpol
  namespace: one-api
spec:
  podSelector:
    matchLabels:
      app: log-service
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: relay-gateway
    - podSelector:
        matchLabels:
          app: admin-api
    ports:
    - protocol: TCP
      port: 9006
    - protocol: TCP
      port: 8006
  egress:
  - to:
    - namespaceSelector: {}
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - protocol: UDP
