apiVersion: apps/v1
kind: Deployment
metadata:
  name: billing-service
  namespace: one-api
  labels:
    app: billing-service
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: billing-service
  template:
    metadata:
      labels:
        app: billing-service
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9004"
        prometheus.io/path: "/metrics"
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
        readOnlyRootFilesystem: true
      containers:
      - name: billing-service
        image: your-registry/billing-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 9004
          protocol: TCP
          name: grpc
        - containerPort: 8004
          protocol: TCP
          name: http
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          privileged: false
          readOnlyRootFilesystem: true
        env:
        - name: CONF_PATH
          value: "/configs/config.yaml"
        - name: DATABASE_DSN
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: dsn
        - name: REDIS_ADDR
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: redis-addr
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: log-level
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          tcpSocket:
            port: 9004
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          tcpSocket:
            port: 9004
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: billing-service
  namespace: one-api
  labels:
    app: billing-service
spec:
  type: ClusterIP
  ports:
  - port: 9004
    targetPort: 9004
    protocol: TCP
    name: grpc
  - port: 8004
    targetPort: 8004
    protocol: TCP
    name: http
  selector:
    app: billing-service
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: billing-service-pdb
  namespace: one-api
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: billing-service
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: billing-service-hpa
  namespace: one-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: billing-service
  minReplicas: 2
  maxReplicas: 6
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
