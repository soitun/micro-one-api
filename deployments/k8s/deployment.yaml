apiVersion: apps/v1
kind: Deployment
metadata:
  name: relay-gateway
  namespace: one-api
  labels:
    app: relay-gateway
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: relay-gateway
  template:
    metadata:
      labels:
        app: relay-gateway
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: relay-gateway
      automountServiceAccountToken: false  # Don't auto-mount service account token
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534  # nobody user
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: relay-gateway
        image: your-registry/relay-gateway:v0.7.2
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          protocol: TCP
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
            add:
            - NET_BIND_SERVICE
          privileged: false
          readOnlyRootFilesystem: true
        env:
        - name: CONF_PATH
          value: "/configs/config.yaml"
        - name: DATABASE_DRIVER
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: database-driver
        - name: DATABASE_DSN
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: dsn
        - name: REDIS_ADDR
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: redis-addr
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: redis-credentials
              key: password
        - name: SERVICE_TOKEN
          valueFrom:
            secretKeyRef:
              name: service-token-secret
              key: token
        - name: IDENTITY_GRPC_ENDPOINT
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: identity-grpc-endpoint
        - name: CHANNEL_GRPC_ENDPOINT
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: channel-grpc-endpoint
        - name: BILLING_GRPC_ENDPOINT
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: billing-grpc-endpoint
        - name: LOG_GRPC_ENDPOINT
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: log-grpc-endpoint
        - name: RATE_LIMIT_REQUESTS_PER_SECOND
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: rate-limit-rps
        - name: RATE_LIMIT_BURST
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: rate-limit-burst
        - name: CORS_ALLOWED_ORIGINS
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: cors-origins
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: log-level
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
          successThreshold: 1
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
          successThreshold: 1
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: relay-gateway
  namespace: one-api
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/relay-gateway-role
automountServiceAccountToken: false
---
apiVersion: v1
kind: Service
metadata:
  name: relay-gateway
  namespace: one-api
  labels:
    app: relay-gateway
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: relay-gateway
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: one-api
data:
  database-driver: "mysql"
  identity-grpc-endpoint: "identity-service:9001"
  identity-http-endpoint: "http://identity-service:8001"
  channel-grpc-endpoint: "channel-service:9002"
  billing-grpc-endpoint: "billing-service:9004"
  billing-http-endpoint: "http://billing-service:8004"
  channel-http-endpoint: "http://channel-service:8002"
  log-grpc-endpoint: "log-service:9006"
  log-http-endpoint: "http://log-service:8006"
  notify-grpc-endpoint: "notify-worker:9008"
  notify-http-endpoint: "http://notify-worker:8008"
  redis-addr: "redis:6379"
  rate-limit-rps: "100"
  rate-limit-burst: "200"
  cors-origins: "https://yourdomain.com,https://app.yourdomain.com"
  log-level: "info"
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: relay-gateway-netpol
  namespace: one-api
spec:
  podSelector:
    matchLabels:
      app: relay-gateway
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: ingress-nginx
    ports:
    - protocol: TCP
      port: 8080
  egress:
  # Allow DNS
  - to:
    - namespaceSelector: {}
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - protocol: UDP
      port: 53
  # Allow communication with identity service
  - to:
    - podSelector:
        matchLabels:
          app: identity-service
    ports:
    - protocol: TCP
      port: 9001
  # Allow communication with channel service
  - to:
    - podSelector:
        matchLabels:
          app: channel-service
    ports:
    - protocol: TCP
      port: 9002
  # Allow communication with billing service
  - to:
    - podSelector:
        matchLabels:
          app: billing-service
    ports:
    - protocol: TCP
      port: 9004
  # Allow communication with log service
  - to:
    - podSelector:
        matchLabels:
          app: log-service
    ports:
    - protocol: TCP
      port: 9006
  # Allow database, Redis, and upstream HTTPS access
  - to: []
    ports:
    - protocol: TCP
      port: 3306
    - protocol: TCP
      port: 6379
    - protocol: TCP
      port: 443
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: relay-gateway-pdb
  namespace: one-api
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: relay-gateway
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: relay-gateway-hpa
  namespace: one-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: relay-gateway
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
