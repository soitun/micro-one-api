version: '3.8'

services:
  # ────────────── Infrastructure ──────────────

  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: oneapi
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ../../migrations/billing:/docker-entrypoint-initdb.d
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: redis
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"]
    volumes:
      - redis_data:/data
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ────────────── Backend Services ──────────────

  identity-service:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
      args:
        SERVICE_NAME: identity-service
    container_name: identity-service
    environment:
      - CONF_PATH=configs/identity-service.yaml
      - DATABASE_DSN=${DATABASE_DSN:?DATABASE_DSN is required}
      - REDIS_ADDR=redis:6379
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}
      - LOG_LEVEL=info
      - LOG_FORMAT=json
    ports:
      - "9001:9001"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL

  channel-service:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
      args:
        SERVICE_NAME: channel-service
    container_name: channel-service
    environment:
      - CONF_PATH=configs/channel-service.yaml
      - DATABASE_DSN=${DATABASE_DSN:?DATABASE_DSN is required}
      - REDIS_ADDR=redis:6379
      - LOG_LEVEL=info
      - LOG_FORMAT=json
    ports:
      - "9002:9002"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL

  billing-service:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
      args:
        SERVICE_NAME: billing-service
    container_name: billing-service
    environment:
      - CONF_PATH=configs/billing-service.yaml
      - DATABASE_DSN=${DATABASE_DSN:?DATABASE_DSN is required}
      - REDIS_ADDR=redis:6379
      - LOG_LEVEL=info
      - LOG_FORMAT=json
    ports:
      - "8004:8004"
      - "9004:9004"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL

  admin-api:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
      args:
        SERVICE_NAME: admin-api
    container_name: admin-api
    environment:
      - CONF_PATH=configs/admin-api.yaml
      - IDENTITY_GRPC_ENDPOINT=identity-service:9001
      - CHANNEL_GRPC_ENDPOINT=channel-service:9002
      - BILLING_GRPC_ENDPOINT=billing-service:9004
      - ADMIN_TOKEN=${ADMIN_TOKEN:?ADMIN_TOKEN is required}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}
      - LOG_LEVEL=info
      - LOG_FORMAT=json
    ports:
      - "3000:3000"
    depends_on:
      - identity-service
      - channel-service
      - billing-service
    networks:
      - backend
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL

  # ────────────── Phase 2 Services ──────────────

  config-service:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
      args:
        SERVICE_NAME: config-service
    container_name: config-service
    environment:
      - CONF_PATH=configs/config-service.yaml
      - DATABASE_DSN=${DATABASE_DSN:?DATABASE_DSN is required}
      - REDIS_ADDR=redis:6379
      - LOG_LEVEL=info
      - LOG_FORMAT=json
    ports:
      - "8005:8005"
      - "9005:9005"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL

  log-service:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
      args:
        SERVICE_NAME: log-service
    container_name: log-service
    environment:
      - CONF_PATH=configs/log-service.yaml
      - DATABASE_DSN=${DATABASE_DSN:?DATABASE_DSN is required}
      - REDIS_ADDR=redis:6379
      - LOG_LEVEL=info
      - LOG_FORMAT=json
    ports:
      - "8006:8006"
      - "9006:9006"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL

  monitor-worker:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
      args:
        SERVICE_NAME: monitor-worker
    container_name: monitor-worker
    environment:
      - CONF_PATH=configs/monitor-worker.yaml
      - DATABASE_DSN=${DATABASE_DSN:?DATABASE_DSN is required}
      - REDIS_ADDR=redis:6379
      - LOG_LEVEL=info
      - LOG_FORMAT=json
    ports:
      - "8007:8007"
      - "9007:9007"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL

  notify-worker:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
      args:
        SERVICE_NAME: notify-worker
    container_name: notify-worker
    environment:
      - CONF_PATH=configs/notify-worker.yaml
      - DATABASE_DSN=${DATABASE_DSN:?DATABASE_DSN is required}
      - REDIS_ADDR=redis:6379
      - LOG_LEVEL=info
      - LOG_FORMAT=json
    ports:
      - "8008:8008"
      - "9008:9008"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL

  # ────────────── API Gateway ──────────────

  relay-gateway:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
      args:
        SERVICE_NAME: relay-gateway
    container_name: relay-gateway
    environment:
      - CONF_PATH=configs/relay-gateway.yaml
      - IDENTITY_GRPC_ENDPOINT=identity-service:9001
      - CHANNEL_GRPC_ENDPOINT=channel-service:9002
      - BILLING_GRPC_ENDPOINT=billing-service:9004
      - RELAY_HTTP_ADDR=:8080
      - RELAY_PROVIDER_TIMEOUT=30s
      - RATE_LIMIT_REQUESTS_PER_SECOND=100
      - RATE_LIMIT_BURST=200
      - CORS_ALLOWED_ORIGINS=https://yourdomain.com,https://app.yourdomain.com
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}
      - SERVICE_TOKEN=${SERVICE_TOKEN:?SERVICE_TOKEN is required}
      - LOG_LEVEL=info
      - LOG_FORMAT=json
    ports:
      - "8080:8080"
    depends_on:
      - identity-service
      - channel-service
      - billing-service
    networks:
      - backend
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

volumes:
  mysql_data:
  redis_data:

networks:
  backend:
    driver: bridge
