version: '3.8'

services:
  # ────────────── Infrastructure ──────────────

  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: oneapi
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ../../migrations/billing:/docker-entrypoint-initdb.d
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ────────────── Backend Services ──────────────

  identity-service:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
      args:
        SERVICE_NAME: identity-service
    container_name: identity-service
    environment:
      - CONF_PATH=configs/identity-service.yaml
      - DATABASE_DSN=root:rootpassword@tcp(mysql:3306)/oneapi?parseTime=true&loc=Local
      - REDIS_ADDR=redis:6379
      - LOG_LEVEL=info
      - LOG_FORMAT=json
    ports:
      - "9001:9001"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL

  channel-service:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
      args:
        SERVICE_NAME: channel-service
    container_name: channel-service
    environment:
      - CONF_PATH=configs/channel-service.yaml
      - DATABASE_DSN=root:rootpassword@tcp(mysql:3306)/oneapi?parseTime=true&loc=Local
      - REDIS_ADDR=redis:6379
      - LOG_LEVEL=info
      - LOG_FORMAT=json
    ports:
      - "9002:9002"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL

  billing-service:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
      args:
        SERVICE_NAME: billing-service
    container_name: billing-service
    environment:
      - CONF_PATH=configs/billing-service.yaml
      - DATABASE_DSN=root:rootpassword@tcp(mysql:3306)/oneapi?parseTime=true&loc=Local
      - REDIS_ADDR=redis:6379
      - LOG_LEVEL=info
      - LOG_FORMAT=json
    ports:
      - "8004:8004"
      - "9004:9004"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL

  admin-api:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
      args:
        SERVICE_NAME: admin-api
    container_name: admin-api
    environment:
      - CONF_PATH=configs/admin-api.yaml
      - IDENTITY_GRPC_ENDPOINT=identity-service:9001
      - CHANNEL_GRPC_ENDPOINT=channel-service:9002
      - BILLING_GRPC_ENDPOINT=billing-service:9004
      - LOG_LEVEL=info
      - LOG_FORMAT=json
    ports:
      - "3000:3000"
    depends_on:
      - identity-service
      - channel-service
      - billing-service
    networks:
      - backend
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL

  # ────────────── API Gateway ──────────────

  relay-gateway:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
      args:
        SERVICE_NAME: relay-gateway
    container_name: relay-gateway
    environment:
      - CONF_PATH=configs/relay-gateway.yaml
      - IDENTITY_GRPC_ENDPOINT=identity-service:9001
      - CHANNEL_GRPC_ENDPOINT=channel-service:9002
      - BILLING_GRPC_ENDPOINT=billing-service:9004
      - RELAY_HTTP_ADDR=:8080
      - RELAY_PROVIDER_TIMEOUT=30s
      - RATE_LIMIT_REQUESTS_PER_SECOND=100
      - RATE_LIMIT_BURST=200
      - CORS_ALLOWED_ORIGINS=https://yourdomain.com,https://app.yourdomain.com
      - LOG_LEVEL=info
      - LOG_FORMAT=json
    ports:
      - "8080:8080"
    depends_on:
      - identity-service
      - channel-service
      - billing-service
    networks:
      - backend
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

volumes:
  mysql_data:
  redis_data:

networks:
  backend:
    driver: bridge
