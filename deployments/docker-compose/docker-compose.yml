services:
  # ────────────── Infrastructure ──────────────

  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: oneapi
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ../../migrations:/docker-entrypoint-initdb.d
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:8.4
    container_name: redis
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"]
    volumes:
      - redis_data:/data
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ────────────── Backend Services ──────────────

  identity-service:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
      args:
        SERVICE_NAME: identity-service
    container_name: identity-service
    environment:
      - CONF_PATH=/configs/identity-service.yaml
      - DATABASE_DSN=${DATABASE_DSN:?DATABASE_DSN is required}
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}
      - BILLING_GRPC_ENDPOINT=billing-service:9004
      - RECHARGE_AMOUNT_MULTIPLIER=${RECHARGE_AMOUNT_MULTIPLIER:-10}
      - INITIAL_ADMIN_USERNAME=${INITIAL_ADMIN_USERNAME:-}
      - INITIAL_ADMIN_EMAIL=${INITIAL_ADMIN_EMAIL:-}
      - INITIAL_ADMIN_PASSWORD=${INITIAL_ADMIN_PASSWORD:-}
      - LOG_LEVEL=info
      - LOG_FORMAT=json
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL

  channel-service:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
      args:
        SERVICE_NAME: channel-service
    container_name: channel-service
    environment:
      - CONF_PATH=/configs/channel-service.yaml
      - DATABASE_DSN=${DATABASE_DSN:?DATABASE_DSN is required}
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      - LOG_LEVEL=info
      - LOG_FORMAT=json
      - NOTIFY_GRPC_ENDPOINT=${NOTIFY_GRPC_ENDPOINT:-notify-worker:9008}
      - CHANNEL_HEALTH_ALERT_ENABLED=${CHANNEL_HEALTH_ALERT_ENABLED:-true}
      - CHANNEL_HEALTH_ALERT_NOTIFY_TYPE=${CHANNEL_HEALTH_ALERT_NOTIFY_TYPE:-webhook}
      - CHANNEL_HEALTH_ALERT_RECIPIENTS=${CHANNEL_HEALTH_ALERT_RECIPIENTS:-[""]}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      notify-worker:
        condition: service_started
    networks:
      - backend
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL

  billing-service:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
      args:
        SERVICE_NAME: billing-service
    container_name: billing-service
    environment:
      - CONF_PATH=/configs/billing-service.yaml
      - DATABASE_DSN=${DATABASE_DSN:?DATABASE_DSN is required}
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      - PAYMENT_QUOTA_PER_UNIT=${PAYMENT_QUOTA_PER_UNIT:-500000}
      - ALIPAY_ENABLED=${ALIPAY_ENABLED:-false}
      - ALIPAY_FORM_URL=${ALIPAY_FORM_URL:-https://openapi-sandbox.dl.alipaydev.com/gateway.do}
      - ALIPAY_APP_ID=${ALIPAY_APP_ID:-9021000164603106}
      - ALIPAY_PRIVATE_KEY=${ALIPAY_PRIVATE_KEY:-}
      - ALIPAY_PRIVATE_KEY_PATH=${ALIPAY_PRIVATE_KEY_PATH:-/cert/alipay/application_private_key.pem}
      - ALIPAY_PUBLIC_KEY=${ALIPAY_PUBLIC_KEY:-}
      - ALIPAY_PUBLIC_KEY_PATH=${ALIPAY_PUBLIC_KEY_PATH:-/cert/alipay/alipay_public_key.pem}
      - ALIPAY_NOTIFY_URL=${ALIPAY_NOTIFY_URL:-}
      - ALIPAY_RETURN_URL=${ALIPAY_RETURN_URL:-}
      - ALIPAY_APP_CERT_PATH=${ALIPAY_APP_CERT_PATH:-}
      - ALIPAY_ROOT_CERT_PATH=${ALIPAY_ROOT_CERT_PATH:-}
      - ALIPAY_PUBLIC_CERT_PATH=${ALIPAY_PUBLIC_CERT_PATH:-}
      - LOG_LEVEL=info
      - NOTIFY_GRPC_ENDPOINT=${NOTIFY_GRPC_ENDPOINT:-notify-worker:9008}
      - RECON_ALERT_ENABLED=${RECON_ALERT_ENABLED:-true}
      - RECON_ALERT_RECIPIENTS=${RECON_ALERT_RECIPIENTS:-[admin]}
      - RECON_ALERT_INTERVAL=${RECON_ALERT_INTERVAL:-1h}
      - LOG_FORMAT=json
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      notify-worker:
        condition: service_started
    networks:
      - backend
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    volumes:
      - ../../cert/alipay:/cert/alipay:ro
    tmpfs:
      - /tmp
    cap_drop:
      - ALL

  admin-api:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
      args:
        SERVICE_NAME: admin-api
        VITE_RECHARGE_AMOUNT_MULTIPLIER: ${RECHARGE_AMOUNT_MULTIPLIER:-10}
    container_name: admin-api
    environment:
      - CONF_PATH=/configs/admin-api.yaml
      - IDENTITY_GRPC_ENDPOINT=identity-service:9001
      - IDENTITY_HTTP_ENDPOINT=http://identity-service:8001
      - CHANNEL_GRPC_ENDPOINT=channel-service:9002
      - CHANNEL_HTTP_ENDPOINT=http://channel-service:8002
      - BILLING_GRPC_ENDPOINT=billing-service:9004
      - DATABASE_DSN=${DATABASE_DSN:?DATABASE_DSN is required}
      - LOG_HTTP_ENDPOINT=http://log-service:8006
      - ADMIN_TOKEN=${ADMIN_TOKEN:?ADMIN_TOKEN is required}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}
      - SERVICE_TOKEN=${SERVICE_TOKEN:?SERVICE_TOKEN is required}
      - ADMIN_WEB_ROOT=/web
      - SUBSCRIPTION_USER_RPM_LIMIT=${SUBSCRIPTION_USER_RPM_LIMIT:-0}
      - LOG_LEVEL=info
      - LOG_FORMAT=json
    ports:
      - "3000:8000"
    depends_on:
      - identity-service
      - channel-service
      - billing-service
    networks:
      - backend
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    volumes:
      - ../../web/dist:/web:ro
    tmpfs:
      - /tmp
    cap_drop:
      - ALL

  # ────────────── Phase 2 Services ──────────────

  config-service:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
      args:
        SERVICE_NAME: config-service
    container_name: config-service
    environment:
      - CONF_PATH=/configs/config-service.yaml
      - DATABASE_DSN=${DATABASE_DSN:?DATABASE_DSN is required}
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      - SERVICE_TOKEN=${SERVICE_TOKEN:?SERVICE_TOKEN is required}
      - LOG_LEVEL=info
      - LOG_FORMAT=json
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL

  log-service:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
      args:
        SERVICE_NAME: log-service
    container_name: log-service
    environment:
      - CONF_PATH=/configs/log-service.yaml
      - DATABASE_DSN=${DATABASE_DSN:?DATABASE_DSN is required}
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      - LOG_LEVEL=info
      - LOG_FORMAT=json
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL

  monitor-worker:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
      args:
        SERVICE_NAME: monitor-worker
    container_name: monitor-worker
    environment:
      - CONF_PATH=/configs/monitor-worker.yaml
      - DATABASE_DSN=${DATABASE_DSN:?DATABASE_DSN is required}
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      - LOG_LEVEL=info
      - LOG_FORMAT=json
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL

  notify-worker:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
      args:
        SERVICE_NAME: notify-worker
    container_name: notify-worker
    environment:
      - CONF_PATH=/configs/notify-worker.yaml
      - DATABASE_DSN=${DATABASE_DSN:?DATABASE_DSN is required}
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      - LOG_LEVEL=info
      - LOG_FORMAT=json
      - NOTIFY_WEBHOOK_URL=${NOTIFY_WEBHOOK_URL:-}
      - NOTIFY_SMTP_HOST=${NOTIFY_SMTP_HOST:-}
      - NOTIFY_SMTP_PORT=${NOTIFY_SMTP_PORT:-587}
      - NOTIFY_SMTP_USER=${NOTIFY_SMTP_USER:-}
      - NOTIFY_SMTP_PASS=${NOTIFY_SMTP_PASS:-}
      - NOTIFY_SMTP_FROM=${NOTIFY_SMTP_FROM:-}
      - NOTIFY_DISPATCH_INTERVAL=${NOTIFY_DISPATCH_INTERVAL:-30s}
      - NOTIFY_DISPATCH_BATCH=${NOTIFY_DISPATCH_BATCH:-20}
      - NOTIFY_MAX_RETRY=${NOTIFY_MAX_RETRY:-3}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL

  # ────────────── API Gateway ──────────────

  relay-gateway:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
      args:
        SERVICE_NAME: relay-gateway
    container_name: relay-gateway
    environment:
      - CONF_PATH=/configs/relay-gateway.yaml
      - IDENTITY_GRPC_ENDPOINT=identity-service:9001
      - CHANNEL_GRPC_ENDPOINT=channel-service:9002
      - BILLING_GRPC_ENDPOINT=billing-service:9004
      - LOG_GRPC_ENDPOINT=log-service:9006
      - DATABASE_DSN=${DATABASE_DSN:?DATABASE_DSN is required}
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      - RELAY_HTTP_ADDR=:8080
      - PAYMENT_QUOTA_PER_UNIT=${PAYMENT_QUOTA_PER_UNIT:-500000}
      - SUBSCRIPTION_USER_RPM_LIMIT=${SUBSCRIPTION_USER_RPM_LIMIT:-0}
      - UPSTREAM_TIMEOUT=300s
      - RELAY_PROVIDER_TIMEOUT=300s
      - RATE_LIMIT_REQUESTS_PER_SECOND=100
      - RATE_LIMIT_BURST=200
      - CORS_ALLOWED_ORIGINS=https://yourdomain.com,https://app.yourdomain.com
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}
      - SERVICE_TOKEN=${SERVICE_TOKEN:?SERVICE_TOKEN is required}
      - LOG_LEVEL=info
      - LOG_FORMAT=json
    ports:
      - "8080:8080"
    depends_on:
      - identity-service
      - channel-service
      - billing-service
      - log-service
    networks:
      - backend
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

volumes:
  mysql_data:
  redis_data:

networks:
  backend:
    driver: bridge
