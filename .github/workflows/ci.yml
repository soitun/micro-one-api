name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install protobuf generators
        run: |
          make init
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build embedded admin frontend
        run: make web-build

      - name: Run tests
        run: make test

      - name: Check architecture boundaries
        run: ./scripts/check-architecture.sh

      - name: Verify generated files are current
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git status --short
            git diff
            exit 1
          fi

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: identity-service
            path: ./app/identity/service/cmd/identity-service
          - service: channel-service
            path: ./app/channel/service/cmd/channel-service
          - service: billing-service
            path: ./app/billing/service/cmd/billing-service
          - service: admin-api
            path: ./app/admin/admin/cmd/admin-api
          - service: config-service
            path: ./app/config/service/cmd/config-service
          - service: log-service
            path: ./app/log/service/cmd/log-service
          - service: monitor-worker
            path: ./app/monitor/job/cmd/monitor-worker
          - service: notify-worker
            path: ./app/notify/job/cmd/notify-worker
          - service: relay-gateway
            path: ./app/relay/interface/cmd/relay-gateway
        platform: [ linux/amd64, linux/arm64 ]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deployments/docker/Dockerfile
          platforms: ${{ matrix.platform }}
          build-args: |
            SERVICE_NAME=${{ matrix.service }}
            SERVICE_PATH=${{ matrix.path }}
          push: false
          tags: micro-one-api/${{ matrix.service }}:ci
