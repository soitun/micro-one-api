server:
  http:
    addr: 0.0.0.0:8004
  grpc:
    addr: 0.0.0.0:9004
data:
  database:
    driver: ${DATABASE_DRIVER:-mysql}
    source: ${DATABASE_DSN}
    # Phase 2.4 schema isolation: empty keeps the legacy shared-database behaviour;
    # set <SVC>_SCHEMA (or DATABASE_SCHEMA) to point this service at its own MySQL
    # database or Postgres schema. See docs/deployment.md §10.
    schema: ${BILLING_SCHEMA:-}
  redis:
    addr: ${REDIS_ADDR:-127.0.0.1:6379}
registry:
  type: ${REGISTRY_TYPE:-}
  consul:
    address: ${CONSUL_ADDR:-127.0.0.1:8500}
    health_check_interval: 10
billing:
  reservation_timeout: 5m
  group_ratios:
    default: 1.0
    vip: 1.0
    svip: 1.0
  model_ratios: ${BILLING_MODEL_RATIOS:-{}}
  completion_ratios: ${BILLING_COMPLETION_RATIOS:-{}}
clients:
  notify:
    endpoint: ${NOTIFY_GRPC_ENDPOINT:-}
    notify_type: ${RECON_ALERT_NOTIFY_TYPE:-event}
recon:
  enabled: ${RECON_ALERT_ENABLED:-true}
  recipients: ${RECON_ALERT_RECIPIENTS:-[""]}
  interval: ${RECON_ALERT_INTERVAL:-3600s}
payment:
  quota_per_unit: ${PAYMENT_QUOTA_PER_UNIT:-500000}
  alipay:
    enabled: ${ALIPAY_ENABLED:-false}
    form_url: "${ALIPAY_FORM_URL:-https://openapi-sandbox.dl.alipaydev.com/gateway.do}"
    app_id: "${ALIPAY_APP_ID:-}"
    private_key: "${ALIPAY_PRIVATE_KEY:-}"
    private_key_path: "${ALIPAY_PRIVATE_KEY_PATH:-}"
    public_key: "${ALIPAY_PUBLIC_KEY:-}"
    public_key_path: "${ALIPAY_PUBLIC_KEY_PATH:-}"
    notify_url: "${ALIPAY_NOTIFY_URL:-}"
    return_url: "${ALIPAY_RETURN_URL:-}"
    app_cert_path: "${ALIPAY_APP_CERT_PATH:-}"
    root_cert_path: "${ALIPAY_ROOT_CERT_PATH:-}"
    alipay_public_cert_path: "${ALIPAY_PUBLIC_CERT_PATH:-}"

partition:
  enabled: ${PARTITION_ENABLED:-false}
  interval: ${PARTITION_INTERVAL:-24h}
  # Tables to maintain. Defaults to both partitioned tables when unset.
  # Set to ["billing_ledgers"] when log-service owns the logs table.
  tables: ${PARTITION_TABLES:-["logs", "billing_ledgers"]}
