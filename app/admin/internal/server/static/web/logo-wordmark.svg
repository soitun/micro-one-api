<svg xmlns="http://www.w3.org/2000/svg" width="760" height="192" viewBox="0 0 760 192" role="img" aria-labelledby="title desc">
  <title id="title">Micro-One-API logo</title>
  <desc id="desc">Horizontal Micro-One-API logo with a gateway routing icon and product wordmark.</desc>
  <defs>
    <linearGradient id="bg" x1="28" y1="16" x2="164" y2="176" gradientUnits="userSpaceOnUse">
      <stop stop-color="#10364a"/>
      <stop offset="0.54" stop-color="#0f5c68"/>
      <stop offset="1" stop-color="#248866"/>
    </linearGradient>
    <linearGradient id="route" x1="54" y1="96" x2="138" y2="96" gradientUnits="userSpaceOnUse">
      <stop stop-color="#65b7ff"/>
      <stop offset="0.52" stop-color="#95f0d0"/>
      <stop offset="1" stop-color="#f4b34e"/>
    </linearGradient>
    <linearGradient id="word" x1="204" y1="70" x2="612" y2="70" gradientUnits="userSpaceOnUse">
      <stop stop-color="#102334"/>
      <stop offset="1" stop-color="#155f62"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#071721" flood-opacity="0.25"/>
    </filter>
    <style>
      .word { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-weight: 850; letter-spacing: 0; }
      .tag { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-weight: 650; letter-spacing: 0; }
    </style>
  </defs>
  <rect x="16" y="16" width="160" height="160" rx="36" fill="url(#bg)"/>
  <path d="M54 75H75C84 75 90 80 96 88L103 96L96 104C90 112 84 117 75 117H54" fill="none" stroke="url(#route)" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M138 75H117C108 75 102 80 96 88L89 96L96 104C102 112 108 117 117 117H138" fill="none" stroke="url(#route)" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
  <g filter="url(#softShadow)">
    <rect x="79" y="62" width="34" height="68" rx="13" fill="#f8fbff"/>
    <path d="M96 78V114" stroke="#123242" stroke-width="9" stroke-linecap="round"/>
  </g>
  <circle cx="54" cy="75" r="8" fill="#65b7ff"/>
  <circle cx="54" cy="117" r="8" fill="#65b7ff"/>
  <circle cx="138" cy="75" r="8" fill="#95f0d0"/>
  <circle cx="138" cy="117" r="8" fill="#f4b34e"/>
  <circle cx="96" cy="96" r="6" fill="#f4b34e"/>
  <text x="204" y="88" class="word" font-size="52" fill="url(#word)">Micro-One-API</text>
  <text x="208" y="126" class="tag" font-size="22" fill="#5a6b78">AI gateway / routing / billing / operations</text>
