syntax = "proto3";

package api.log.v1;

option go_package = "micro-one-api/app/log/internal/conf;conf";

import "google/protobuf/duration.proto";

// Bootstrap is the top-level configuration loaded from config.yaml.
message Bootstrap {
  Server server = 1;
  Data data = 2;
  Registry registry = 3;
  LogSvc log_svc = 4;
  Partition partition = 5;
}

// Server holds the HTTP and gRPC server configuration.
message Server {
  HTTP http = 1;
  GRPC grpc = 2;
}

message HTTP {
  string addr = 1 [json_name = "addr"];
}

message GRPC {
  string addr = 1 [json_name = "addr"];
}

// Data holds the database and Redis configuration.
message Data {
  Database database = 1;
  Redis redis = 2;
}

message Database {
  string driver = 1 [json_name = "driver"];
  string source = 2 [json_name = "source"];
  // Schema isolates this service to a specific database schema (Phase 2.4).
  string schema = 3 [json_name = "schema"];
}

message Redis {
  string addr = 1 [json_name = "addr"];
}

// Registry holds the service registry configuration.
message Registry {
  string type = 1 [json_name = "type"];
  Consul consul = 2 [json_name = "consul"];
  map<string, string> metadata = 3 [json_name = "metadata"];
}

message Consul {
  string address = 1 [json_name = "address"];
  int64 health_check_interval = 2 [json_name = "health_check_interval"];
}

// LogSvc holds the log-service-specific settings.
message LogSvc {
  // RetentionDays is how many days to retain logs.
  int32 retention_days = 1 [json_name = "retention_days"];
  // BatchSize is the batch insert size for log ingestion.
  int32 batch_size = 2 [json_name = "batch_size"];
  // BatchEnabled toggles the async batch log writer. When false (default),
  // IngestLog writes synchronously via repo.Create. When true, entries are
  // queued and flushed in batches by the background writer, lowering
  // per-request log latency at the cost of eventual consistency.
  bool batch_enabled = 3 [json_name = "batch_enabled"];
  // BatchFlushInterval is how often the batch writer flushes pending
  // entries when BatchSize has not been reached.
  google.protobuf.Duration batch_flush_interval = 4 [json_name = "batch_flush_interval"];
}

// PartitionConfig controls periodic table-partition maintenance for the
// log-service. When Enabled, a background ticker runs PartitionMaintenance
// over the configured interval.
message Partition {
  bool enabled = 1 [json_name = "enabled"];
  string interval = 2 [json_name = "interval"];
}
