server:
  http:
    addr: 0.0.0.0:8001
  grpc:
    addr: 0.0.0.0:9001
data:
  database:
    driver: ${DATABASE_DRIVER:-mysql}
    source: ${DATABASE_DSN}
    # Phase 2.4 schema isolation: empty keeps the legacy shared-database behaviour;
    # set <SVC>_SCHEMA (or DATABASE_SCHEMA) to point this service at its own MySQL
    # database or Postgres schema. See docs/deployment.md §10.
    schema: ${IDENTITY_SCHEMA:-}
  redis:
    addr: ${REDIS_ADDR:-127.0.0.1:6379}
registry:
  type: ${REGISTRY_TYPE:-}
  consul:
    address: ${CONSUL_ADDR:-127.0.0.1:8500}
    health_check_interval: 10
clients:
  billing:
    endpoint: ${BILLING_GRPC_ENDPOINT:-127.0.0.1:9004}
oauth:
  base_url: ${OAUTH_BASE_URL:-http://localhost:8001}
  github:
    enabled: ${OAUTH_GITHUB_ENABLED:-false}
    client_id: ${OAUTH_GITHUB_CLIENT_ID:-}
    client_secret: ${OAUTH_GITHUB_CLIENT_SECRET:-}
  google:
    enabled: ${OAUTH_GOOGLE_ENABLED:-false}
    client_id: ${OAUTH_GOOGLE_CLIENT_ID:-}
    client_secret: ${OAUTH_GOOGLE_CLIENT_SECRET:-}
  oidc:
    enabled: ${OAUTH_OIDC_ENABLED:-false}
    client_id: ${OAUTH_OIDC_CLIENT_ID:-}
    client_secret: ${OAUTH_OIDC_CLIENT_SECRET:-}
    authorize_url: ${OAUTH_OIDC_AUTHORIZE_URL:-}
    token_url: ${OAUTH_OIDC_TOKEN_URL:-}
    user_info_url: ${OAUTH_OIDC_USER_INFO_URL:-}
    scopes: ${OAUTH_OIDC_SCOPES:-[openid,email,profile]}
  lark:
    enabled: ${OAUTH_LARK_ENABLED:-false}
    client_id: ${OAUTH_LARK_CLIENT_ID:-}
    client_secret: ${OAUTH_LARK_CLIENT_SECRET:-}
  wechat:
    enabled: ${OAUTH_WECHAT_ENABLED:-false}
    client_id: ${OAUTH_WECHAT_CLIENT_ID:-}
    client_secret: ${OAUTH_WECHAT_CLIENT_SECRET:-}
registration:
  disabled: ${REGISTRATION_DISABLED:-false}
  email_domain_restriction_enabled: ${REGISTRATION_EMAIL_DOMAIN_RESTRICTION_ENABLED:-false}
  email_domain_whitelist: ${REGISTRATION_EMAIL_DOMAIN_WHITELIST:-[]}
  turnstile_check_enabled: ${TURNSTILE_CHECK_ENABLED:-false}
  turnstile_secret: ${TURNSTILE_SECRET:-}
