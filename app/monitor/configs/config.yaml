server:
  http:
    addr: 0.0.0.0:8007
  grpc:
    addr: 0.0.0.0:9007
data:
  database:
    driver: ${DATABASE_DRIVER:-mysql}
    source: ${DATABASE_DSN}
    # Phase 2.4 schema isolation: empty keeps the legacy shared-database behaviour;
    # set <SVC>_SCHEMA (or DATABASE_SCHEMA) to point this service at its own MySQL
    # database or Postgres schema. See docs/deployment.md §10.
    schema: ${MONITOR_SCHEMA:-}
  redis:
    addr: ${REDIS_ADDR:-127.0.0.1:6379}
registry:
  type: ${REGISTRY_TYPE:-}
  consul:
    address: ${CONSUL_ADDR:-127.0.0.1:8500}
    health_check_interval: 10
monitor_svc:
  collect_interval_sec: ${MONITOR_COLLECT_INTERVAL:-60}
  alert_retention_days: ${MONITOR_ALERT_RETENTION:-30}
  notify_email: ${MONITOR_NOTIFY_EMAIL:-}
  channel_health_check_enabled: ${CHANNEL_HEALTH_CHECK_ENABLED:-true}
  channel_health_check_interval: ${CHANNEL_HEALTH_CHECK_INTERVAL:-300s}
  channel_health_check_timeout: ${CHANNEL_HEALTH_CHECK_TIMEOUT:-10s}
clients:
  channel:
    endpoint: ${CHANNEL_GRPC_ENDPOINT:-127.0.0.1:9002}
